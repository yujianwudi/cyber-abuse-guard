name: Attested prerelease - HOST, AUDIT, AND EVALUATION REQUIRED

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated development tag (v0.15-dev.round6 or numbered suffix)
        required: true
        type: string
      expected_commit:
        description: Exact 40-character commit expected at the existing tag
        required: true
        type: string
      expected_tree:
        description: Exact 40-character source tree expected at the existing tag
        required: true
        type: string
      ci_run_id:
        description: Successful CI workflow run ID for the exact expected commit
        required: true
        type: string
      candidate_run_id:
        description: Successful clean-candidate workflow run used by the pinned CPA v7.2.88 Host record
        required: true
        type: string
      expected_so_sha256:
        description: Exact candidate SO SHA-256 cited by the CPA v7.2.88 Host record and independent audit
        required: true
        type: string
      expected_store_zip_sha256:
        description: Exact candidate CPA Store ZIP SHA-256 cited by Host and independent audit records
        required: true
        type: string
      host_validation:
        description: Authorized isolated CPA v7.2.88 Host + Mock matrix result
        required: true
        type: choice
        default: BLOCKED
        options:
          - BLOCKED
          - PASS
      host_evidence_sha256:
        description: SHA-256 of the low-sensitivity CPA Host evidence
        required: true
        type: string
      independent_audit_validation:
        description: Independent source, artifact, and Host audit result
        required: true
        type: choice
        default: BLOCKED
        options:
          - BLOCKED
          - PASS
      independent_audit_sha256:
        description: SHA-256 of the independent audit report
        required: true
        type: string
      independent_evaluation_validation:
        description: Independently authored unseen evaluation result for this exact candidate
        required: true
        type: choice
        default: BLOCKED
        options:
          - BLOCKED
          - PASS
      independent_evaluation_id:
        description: Consumed unseen evaluation identity (evaluation-v11 or later)
        required: true
        type: string
      independent_evaluation_sha256:
        description: SHA-256 of the low-sensitivity consumed evaluation report
        required: true
        type: string
      authorize_blocked_prerelease:
        description: Explicitly authorize creation of a blocked, draft, non-latest prerelease
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: round6-blocked-prerelease-${{ inputs.tag }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.4'
  VERSION: '0.15'
  CYCLONEDX_GOMOD_VERSION: 'v1.9.0'

jobs:
  admission:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Fail closed unless every external gate and authorization is explicit
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          EXPECTED_SO_SHA256: ${{ inputs.expected_so_sha256 }}
          EXPECTED_STORE_ZIP_SHA256: ${{ inputs.expected_store_zip_sha256 }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          HOST_VALIDATION: ${{ inputs.host_validation }}
          HOST_EVIDENCE_SHA256: ${{ inputs.host_evidence_sha256 }}
          INDEPENDENT_AUDIT: ${{ inputs.independent_audit_validation }}
          INDEPENDENT_AUDIT_SHA256: ${{ inputs.independent_audit_sha256 }}
          INDEPENDENT_EVALUATION: ${{ inputs.independent_evaluation_validation }}
          INDEPENDENT_EVALUATION_ID: ${{ inputs.independent_evaluation_id }}
          INDEPENDENT_EVALUATION_SHA256: ${{ inputs.independent_evaluation_sha256 }}
          AUTHORIZED: ${{ inputs.authorize_blocked_prerelease }}
        run: |
          [[ "$TAG" =~ ^v0\.15-dev\.round6([.][0-9]+)?$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CI_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$CANDIDATE_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$EXPECTED_SO_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_STORE_ZIP_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DISPATCH_REF" == "refs/tags/$TAG" ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_REF" == "${GITHUB_REPOSITORY}/.github/workflows/attested-prerelease.yml@refs/tags/$TAG" ]]
          [[ "$HOST_VALIDATION" == PASS ]]
          [[ "$INDEPENDENT_AUDIT" == PASS ]]
          [[ "$INDEPENDENT_EVALUATION" == PASS ]]
          [[ "$AUTHORIZED" == true ]]
          [[ "$HOST_EVIDENCE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$INDEPENDENT_AUDIT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$INDEPENDENT_EVALUATION_ID" =~ ^evaluation-v(1[1-9]|[2-9][0-9]|[1-9][0-9]{2,})$ ]]
          [[ "$INDEPENDENT_EVALUATION_SHA256" =~ ^[0-9a-f]{64}$ ]]
      - name: Bind admission to a successful CI run for the exact commit
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          response="$(mktemp)"
          trap 'rm -f -- "$response"' EXIT
          curl --fail-with-body --silent --show-error --location \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}" \
            --output "$response"
          jq -e \
            --arg run_id "$CI_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg expected_commit "$EXPECTED_COMMIT" \
            '(.id | tostring) == $run_id and
             .name == "CI" and
             .path == ".github/workflows/ci.yml" and
             .event == "push" and
             .head_sha == $expected_commit and
             .status == "completed" and
             .conclusion == "success" and
             .repository.full_name == $repository' \
            "$response" >/dev/null
      - name: Bind admission to the successful clean-candidate run
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          response="$(mktemp)"
          trap 'rm -f -- "$response"' EXIT
          curl --fail-with-body --silent --show-error --location \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE_RUN_ID}" \
            --output "$response"
          jq -e \
            --arg run_id "$CANDIDATE_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg expected_commit "$EXPECTED_COMMIT" \
            '(.id | tostring) == $run_id and
             .name == "Candidate build - NOT A RELEASE" and
             .path == ".github/workflows/candidate.yml" and
             .event == "workflow_dispatch" and
             .head_sha == $expected_commit and
             .status == "completed" and
             .conclusion == "success" and
             .repository.full_name == $repository' \
            "$response" >/dev/null

  verify:
    needs: admission
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout the explicitly supplied existing tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/cmd/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/cmd/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/cmd/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/cmd/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/cmd/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/cmd/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/docs/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]_[Rr][Ee][Pp][Oo][Rr][Tt].[Mm][Dd]
            !/docs/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/docs/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/docs/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/docs/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/internal/classifier/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/internal/classifier/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/internal/classifier/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/internal/classifier/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/internal/classifier/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/internal/classifier/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/testdata/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/testdata/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/testdata/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/testdata/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/testdata/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/testdata/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
      - name: Recheck the Round6 restricted-data boundary
        run: |
          python3 -B scripts/round6_safe_gate_contract_test.py
          python3 -B scripts/round6_safe_gate_contract.py --root .
          ./scripts/release-doc-consistency.sh
      - name: Verify immutable source identity and annotated tag
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ "$(git cat-file -t "refs/tags/$TAG")" == tag ]]
          [[ "$(git rev-list -n 1 "refs/tags/$TAG")" == "$EXPECTED_COMMIT" ]]
          [[ -z "$(git status --porcelain)" ]]
      - name: Set up pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install bounded build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file jq zip unzip
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Download the exact Host-tested clean candidate artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: round6-v0.15-candidate-${{ inputs.expected_commit }}
          path: ${{ runner.temp }}/host-tested-candidate
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}
      - name: Verify candidate manifest and Host-tested artifact bytes
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          EXPECTED_SO_SHA256: ${{ inputs.expected_so_sha256 }}
          EXPECTED_STORE_ZIP_SHA256: ${{ inputs.expected_store_zip_sha256 }}
        run: |
          set -euo pipefail
          candidate_dir="$RUNNER_TEMP/host-tested-candidate"
          manifest="$candidate_dir/candidate-manifest.json"
          expected_candidate_files="$(printf '%s\n' \
            build-metadata.json \
            candidate-manifest.json \
            checksums.txt \
            cyber-abuse-guard-v0.15.so \
            cyber-abuse-guard-v0.15.so.sha256 \
            cyber-abuse-guard_0.15_linux_amd64.zip \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json | LC_ALL=C sort)"
          actual_candidate_files="$(find "$candidate_dir" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual_candidate_files" == "$expected_candidate_files" ]]
          jq -e \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            --arg run_id "$CANDIDATE_RUN_ID" \
            --arg so_sha256 "$EXPECTED_SO_SHA256" \
            --arg store_zip_sha256 "$EXPECTED_STORE_ZIP_SHA256" '
              .schema_version == 1 and
              .status == "UNRELEASED / HOST AND INDEPENDENT AUDIT REQUIRED" and
              .version == "0.15" and .commit == $commit and .tree == $tree and
              .github.repository == env.GITHUB_REPOSITORY and
              .github.workflow_ref == (env.GITHUB_REPOSITORY + "/.github/workflows/candidate.yml@refs/heads/main") and
              .github.workflow_sha == $commit and .github.event == "workflow_dispatch" and
              .github.ref == "refs/heads/main" and
              (.github.run_id | type == "number" and tostring == $run_id) and
              .artifacts.so.name == "cyber-abuse-guard-v0.15.so" and
              .artifacts.so.sha256 == $so_sha256 and
              .artifacts.store_zip.name == "cyber-abuse-guard_0.15_linux_amd64.zip" and
              .artifacts.store_zip.sha256 == $store_zip_sha256
            ' "$manifest" >/dev/null
          [[ "$(sha256sum "$candidate_dir/cyber-abuse-guard-v0.15.so" | awk '{print $1}')" == "$EXPECTED_SO_SHA256" ]]
          [[ "$(sha256sum "$candidate_dir/cyber-abuse-guard_0.15_linux_amd64.zip" | awk '{print $1}')" == "$EXPECTED_STORE_ZIP_SHA256" ]]
          jq -e --arg commit "$EXPECTED_COMMIT" --arg tree "$EXPECTED_TREE" \
            '.version == "0.15" and .source_version == "0.15" and .dirty == false and .commit == $commit and .tree == $tree' \
            "$candidate_dir/build-metadata.json" >/dev/null
      - name: Run source and Round6 regression gates
        run: |
          make round6-format-check round6-git-diff-check round6-module-verify round6-regression round6-vet
          go test ./internal/classifier -run '^TestClassifierPolicyIdentity$' -count=1
      - name: Verify pinned CPA v7.2.88 source compatibility
        env:
          CPA_COMPAT_VERIFY_REMOTE: '1'
        run: make cpa-latest-compat
      - name: Rebuild the exact clean Host-tested candidate
        env:
          RELEASE_CANDIDATE_BUILD: '1'
          RELEASE_CANDIDATE_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_CANDIDATE_EXPECTED_TREE: ${{ inputs.expected_tree }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          REQUIRE_DIST_ARTIFACTS: '1'
        run: make round6-development-artifacts round6-cpa-store-contract artifact-hash
      - name: Prove clean candidate reproducibility against root artifacts
        env:
          RELEASE_CANDIDATE_BUILD: '1'
          RELEASE_CANDIDATE_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_CANDIDATE_EXPECTED_TREE: ${{ inputs.expected_tree }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
        run: make round6-reproducibility-test
      - name: Recheck source cleanliness
        run: make clean-tree-check
      - name: Reverify source and artifact identity before transfer
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          EXPECTED_SO_SHA256: ${{ inputs.expected_so_sha256 }}
          EXPECTED_STORE_ZIP_SHA256: ${{ inputs.expected_store_zip_sha256 }}
          BASH_ENV: ''
          ENV: ''
          PATH: /usr/bin:/bin
          CDPATH: ''
          GLOBIGNORE: ''
          PROMPT_COMMAND: ''
          LD_PRELOAD: ''
          LD_LIBRARY_PATH: ''
          LD_AUDIT: ''
          PYTHONPATH: ''
          PYTHONHOME: ''
          PERL5OPT: ''
          RUBYOPT: ''
          NODE_OPTIONS: ''
          NODE_PATH: ''
          GIT_CONFIG_COUNT: '0'
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
          GIT_CONFIG_NOSYSTEM: '1'
          GIT_TERMINAL_PROMPT: '0'
          GIT_ASKPASS: /bin/false
          SSH_ASKPASS: /bin/false
          GIT_SSH_COMMAND: /bin/false
          CURL_HOME: /nonexistent
          GH_CONFIG_DIR: /nonexistent
          HTTP_PROXY: ''
          HTTPS_PROXY: ''
          ALL_PROXY: ''
        run: |
          [[ "$(/usr/bin/git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(/usr/bin/git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ -z "$(/usr/bin/git status --porcelain)" ]]
          /usr/bin/jq -e \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            '.commit == $commit and .tree == $tree' \
            dist/build-metadata.json >/dev/null
          /usr/bin/jq -e '.version == "0.15" and .source_version == "0.15" and .dirty == false' dist/build-metadata.json >/dev/null
          actual_so_sha256="$(/usr/bin/sha256sum dist/cyber-abuse-guard-v0.15.so | /usr/bin/awk '{print $1}')"
          [[ "$actual_so_sha256" == "$EXPECTED_SO_SHA256" ]]
          actual_store_zip_sha256="$(/usr/bin/sha256sum dist/cyber-abuse-guard_0.15_linux_amd64.zip | /usr/bin/awk '{print $1}')"
          [[ "$actual_store_zip_sha256" == "$EXPECTED_STORE_ZIP_SHA256" ]]
          /usr/bin/cmp -s "$RUNNER_TEMP/host-tested-candidate/cyber-abuse-guard-v0.15.so" \
            dist/cyber-abuse-guard-v0.15.so
          /usr/bin/cmp -s "$RUNNER_TEMP/host-tested-candidate/cyber-abuse-guard_0.15_linux_amd64.zip" \
            dist/cyber-abuse-guard_0.15_linux_amd64.zip
      - name: Upload exact verified blocked-development artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        env:
          BASH_ENV: ''
          ENV: ''
          PATH: /usr/bin:/bin
          CDPATH: ''
          GLOBIGNORE: ''
          PROMPT_COMMAND: ''
          LD_PRELOAD: ''
          LD_LIBRARY_PATH: ''
          LD_AUDIT: ''
          PYTHONPATH: ''
          PYTHONHOME: ''
          PERL5OPT: ''
          RUBYOPT: ''
          NODE_OPTIONS: ''
          NODE_PATH: ''
          GIT_CONFIG_COUNT: '0'
          GIT_CONFIG_GLOBAL: /dev/null
          GIT_CONFIG_SYSTEM: /dev/null
          GIT_CONFIG_NOSYSTEM: '1'
          GIT_TERMINAL_PROMPT: '0'
          GIT_ASKPASS: /bin/false
          SSH_ASKPASS: /bin/false
          GIT_SSH_COMMAND: /bin/false
          CURL_HOME: /nonexistent
          GH_CONFIG_DIR: /nonexistent
          HTTP_PROXY: ''
          HTTPS_PROXY: ''
          ALL_PROXY: ''
        with:
          name: round6-blocked-${{ inputs.expected_commit }}
          path: |
            dist/cyber-abuse-guard-v0.15.so
            dist/cyber-abuse-guard-v0.15.so.sha256
            dist/cyber-abuse-guard_0.15_linux_amd64.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: verify
    environment: round6-independent-audit
    if: >-
      inputs.host_validation == 'PASS' &&
      inputs.independent_audit_validation == 'PASS' &&
      inputs.independent_evaluation_validation == 'PASS' &&
      inputs.authorize_blocked_prerelease == true
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Download exact verified blocked-development artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: round6-blocked-${{ inputs.expected_commit }}
          path: dist
      - name: Reverify transferred artifact identity without a repository token
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          EXPECTED_SO_SHA256: ${{ inputs.expected_so_sha256 }}
          EXPECTED_STORE_ZIP_SHA256: ${{ inputs.expected_store_zip_sha256 }}
          TAG: ${{ inputs.tag }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          HOST_EVIDENCE_SHA256: ${{ inputs.host_evidence_sha256 }}
          INDEPENDENT_AUDIT_SHA256: ${{ inputs.independent_audit_sha256 }}
          INDEPENDENT_EVALUATION_ID: ${{ inputs.independent_evaluation_id }}
          INDEPENDENT_EVALUATION_SHA256: ${{ inputs.independent_evaluation_sha256 }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          required_artifacts=(
            cyber-abuse-guard-v0.15.so
            cyber-abuse-guard-v0.15.so.sha256
            cyber-abuse-guard_0.15_linux_amd64.zip
            build-metadata.json
            checksums.txt
            ruleset-manifest.json
            ruleset.sha256
            sbom.cdx.json
          )
          for artifact in "${required_artifacts[@]}"; do
            [[ -f "dist/$artifact" ]]
          done
          expected_checksum_files="$(printf '%s\n' \
            cyber-abuse-guard-v0.15.so \
            cyber-abuse-guard-v0.15.so.sha256 \
            cyber-abuse-guard_0.15_linux_amd64.zip \
            build-metadata.json \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json)"
          actual_checksum_files="$(/usr/bin/awk '{print $2}' dist/checksums.txt)"
          [[ "$actual_checksum_files" == "$expected_checksum_files" ]]
          (cd dist && /usr/bin/sha256sum -c checksums.txt)
          [[ "$(/usr/bin/awk 'END { print NR }' dist/cyber-abuse-guard-v0.15.so.sha256)" == 1 ]]
          [[ "$(/usr/bin/awk '{print $2}' dist/cyber-abuse-guard-v0.15.so.sha256)" == cyber-abuse-guard-v0.15.so ]]
          (cd dist && /usr/bin/sha256sum -c cyber-abuse-guard-v0.15.so.sha256)
          [[ "$(/usr/bin/awk 'END { print NR }' dist/ruleset.sha256)" == 1 ]]
          [[ "$(/usr/bin/awk '{print $2}' dist/ruleset.sha256)" == ruleset-manifest.json ]]
          (cd dist && /usr/bin/sha256sum -c ruleset.sha256)
          /usr/bin/jq -e --arg commit "$EXPECTED_COMMIT" --arg tree "$EXPECTED_TREE" '.version == "0.15" and .source_version == "0.15" and .dirty == false and .commit == $commit and .tree == $tree' dist/build-metadata.json >/dev/null
          /usr/bin/jq -e 'type == "object"' dist/ruleset-manifest.json >/dev/null
          /usr/bin/jq -e '.bomFormat == "CycloneDX"' dist/sbom.cdx.json >/dev/null
          actual_so_sha256="$(/usr/bin/sha256sum dist/cyber-abuse-guard-v0.15.so | /usr/bin/awk '{print $1}')"
          [[ "$actual_so_sha256" == "$EXPECTED_SO_SHA256" ]]
          zip_path=dist/cyber-abuse-guard_0.15_linux_amd64.zip
          [[ "$(/usr/bin/sha256sum "$zip_path" | /usr/bin/awk '{print $1}')" == "$EXPECTED_STORE_ZIP_SHA256" ]]
          zip_listing="$(/usr/bin/unzip -Z1 "$zip_path")"
          ! printf '%s\n' "$zip_listing" | /usr/bin/grep -Eq '(^/|(^|/)\.\.(/|$)|\\)'
          zip_so=cyber-abuse-guard-v0.15.so
          [[ "$zip_listing" == "$zip_so" ]]
          zip_so_file="$(/usr/bin/mktemp)"
          trap '/usr/bin/rm -f -- "$zip_so_file"' EXIT
          /usr/bin/unzip -p "$zip_path" "$zip_so" > "$zip_so_file"
          [[ "$(/usr/bin/sha256sum "$zip_so_file" | /usr/bin/awk '{print $1}')" == "$EXPECTED_SO_SHA256" ]]
          /usr/bin/jq -n \
            --arg tag "$TAG" \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            --arg ci_run_id "$CI_RUN_ID" \
            --arg candidate_run_id "$CANDIDATE_RUN_ID" \
            --arg so_sha256 "$EXPECTED_SO_SHA256" \
            --arg store_zip_sha256 "$EXPECTED_STORE_ZIP_SHA256" \
            --arg host_evidence_sha256 "$HOST_EVIDENCE_SHA256" \
            --arg independent_audit_sha256 "$INDEPENDENT_AUDIT_SHA256" \
            --arg independent_evaluation_id "$INDEPENDENT_EVALUATION_ID" \
            --arg independent_evaluation_sha256 "$INDEPENDENT_EVALUATION_SHA256" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow_ref "$GITHUB_WORKFLOW_REF" \
            --arg workflow_sha "$WORKFLOW_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            '{
              schema_version: 2,
              status: "HOST_AUDIT_AND_EVALUATION_PASS / FORMAL_RELEASE_BLOCKED",
              version: "0.15",
              tag: $tag,
              commit: $commit,
              tree: $tree,
              ci_run_id: ($ci_run_id | tonumber),
              candidate_run_id: ($candidate_run_id | tonumber),
              artifacts: {
                so_sha256: $so_sha256,
                store_zip_sha256: $store_zip_sha256
              },
              evidence: {
                cpa_version: "v7.2.88",
                cpa_commit: "93d74a890a44802f656d7f39a573916b2611896e",
                cpa_host_sha256: $host_evidence_sha256,
                independent_audit_sha256: $independent_audit_sha256,
                independent_evaluation_id: $independent_evaluation_id,
                independent_evaluation_status: "CONSUMED / PASS",
                independent_evaluation_sha256: $independent_evaluation_sha256
              },
              workflow: {
                repository: $repository,
                ref: $workflow_ref,
                sha: $workflow_sha,
                run_id: ($run_id | tonumber),
                run_attempt: ($run_attempt | tonumber)
              }
            }' >dist/round6-prerelease-attestation.json
          (cd dist && /usr/bin/sha256sum round6-prerelease-attestation.json >round6-prerelease-attestation.json.sha256)
      - name: Upload immutable blocked-attestation artifact for the formal workflow
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: round6-blocked-attested-${{ inputs.expected_commit }}
          path: |
            dist/cyber-abuse-guard-v0.15.so
            dist/cyber-abuse-guard-v0.15.so.sha256
            dist/cyber-abuse-guard_0.15_linux_amd64.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/round6-prerelease-attestation.json
            dist/round6-prerelease-attestation.json.sha256
          if-no-files-found: error
          retention-days: 30
      - name: Recheck immutable tag and create draft blocked prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          EXPECTED_SO_SHA256: ${{ inputs.expected_so_sha256 }}
          EXPECTED_STORE_ZIP_SHA256: ${{ inputs.expected_store_zip_sha256 }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          HOST_EVIDENCE_SHA256: ${{ inputs.host_evidence_sha256 }}
          INDEPENDENT_AUDIT_SHA256: ${{ inputs.independent_audit_sha256 }}
          INDEPENDENT_EVALUATION_ID: ${{ inputs.independent_evaluation_id }}
          INDEPENDENT_EVALUATION_SHA256: ${{ inputs.independent_evaluation_sha256 }}
        run: |
          tag_ref="$(/usr/bin/gh api --header 'Accept: application/vnd.github+json' --header 'X-GitHub-Api-Version: 2022-11-28' "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG")"
          [[ "$(/usr/bin/jq -r '.ref' <<<"$tag_ref")" == "refs/tags/$TAG" ]]
          [[ "$(/usr/bin/jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(/usr/bin/jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          tag_object="$(/usr/bin/gh api --header 'Accept: application/vnd.github+json' --header 'X-GitHub-Api-Version: 2022-11-28' "repos/$GITHUB_REPOSITORY/git/tags/$tag_object_sha")"
          [[ "$(/usr/bin/jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(/usr/bin/jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          notes="$(/usr/bin/mktemp)"
          trap '/usr/bin/rm -f -- "$notes"' EXIT
          printf '%s\n' \
            'BLOCKED / NOT A FORMAL RELEASE' \
            '' \
            'Development evidence only. This is not production admission or deployment authorization.' \
            "CPA Host identity: v7.2.88 (93d74a890a44802f656d7f39a573916b2611896e)" \
            "CPA Host evidence SHA-256: $HOST_EVIDENCE_SHA256" \
            "Independent audit SHA-256: $INDEPENDENT_AUDIT_SHA256" \
            "Independent consumed evaluation: $INDEPENDENT_EVALUATION_ID" \
            "Independent evaluation SHA-256: $INDEPENDENT_EVALUATION_SHA256" \
            "Source commit: $EXPECTED_COMMIT" \
            "Source tree: $EXPECTED_TREE" \
            "Successful exact-source push CI run: $CI_RUN_ID" \
            "Successful clean-candidate workflow run: $CANDIDATE_RUN_ID" \
            "Candidate Linux amd64 SO SHA-256: $EXPECTED_SO_SHA256" \
            "Candidate CPA Store ZIP SHA-256: $EXPECTED_STORE_ZIP_SHA256" \
            'GitHub environment: round6-independent-audit (independent reviewers required in repository settings).' \
            'Artifacts are clean exact-source candidates but remain unreleased; they exclude holdout, evaluation, consumed, private payload, production request, and audit data.' \
            > "$notes"
          release_assets=(
            dist/cyber-abuse-guard-v0.15.so
            dist/cyber-abuse-guard-v0.15.so.sha256
            dist/cyber-abuse-guard_0.15_linux_amd64.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/round6-prerelease-attestation.json
            dist/round6-prerelease-attestation.json.sha256
          )
          expected_assets_json="$(/usr/bin/jq -cn --args '$ARGS.positional | sort' -- "${release_assets[@]##*/}")"
          if ! /usr/bin/jq -e '
            (type == "array") and
            (length > 0) and
            all(.[]; type == "string" and length > 0) and
            (length == (unique | length))
          ' <<<"$expected_assets_json" >/dev/null; then
            printf '%s\n' 'blocked prerelease asset allowlist is empty, invalid, or duplicated' >&2
            exit 1
          fi
          releases="$RUNNER_TEMP/blocked-prerelease-releases.json"
          /usr/bin/gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" >"$releases"
          existing="$(/usr/bin/jq -c --arg tag "$TAG" '
            [ .[][] | select(.tag_name == $tag) ] |
            if length == 0 then null
            elif length == 1 then .[0]
            else error("duplicate releases exist for blocked prerelease tag")
            end
          ' "$releases")"
          if [[ "$existing" == null ]]; then
            /usr/bin/gh release create "$TAG" "${release_assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --prerelease \
              --latest=false \
              --title "$TAG - HOST/AUDIT/EVALUATION ATTESTED, FORMAL RELEASE BLOCKED" \
              --notes-file "$notes" \
              --verify-tag
          else
            [[ "$(/usr/bin/jq -r '.draft' <<<"$existing")" == true ]]
            [[ "$(/usr/bin/jq -r '.prerelease' <<<"$existing")" == true ]]
            if ! /usr/bin/jq -e --argjson expected "$expected_assets_json" '
              (.assets | type == "array") and
              ([.assets[].name] as $actual |
                all($actual[]; type == "string" and length > 0) and
                (($actual | length) == ($actual | unique | length)) and
                (($actual - $expected) | length == 0))
            ' <<<"$existing" >/dev/null; then
              printf '%s\n' 'existing blocked prerelease draft contains unattested, duplicate, or invalid assets' >&2
              exit 1
            fi
            /usr/bin/gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --prerelease \
              --latest=false \
              --title "$TAG - HOST/AUDIT/EVALUATION ATTESTED, FORMAL RELEASE BLOCKED" \
              --notes-file "$notes"
            /usr/bin/gh release upload "$TAG" "${release_assets[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          fi

          /usr/bin/gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" >"$releases"
          release="$(/usr/bin/jq -ce --arg tag "$TAG" '
            [ .[][] | select(.tag_name == $tag) ] |
            if length == 1 then .[0]
            else error("expected exactly one blocked prerelease after publish")
            end
          ' "$releases")"
          [[ "$(/usr/bin/jq -r '.draft' <<<"$release")" == true ]]
          [[ "$(/usr/bin/jq -r '.prerelease' <<<"$release")" == true ]]
          /usr/bin/jq -e --argjson expected "$expected_assets_json" '
            (.assets | type == "array") and
            ([.assets[].name] as $actual |
              all($actual[]; type == "string" and length > 0) and
              (($actual | sort) == ($expected | sort)))
          ' <<<"$release" >/dev/null
          /usr/bin/jq -e 'all(.assets[]; .state == "uploaded")' <<<"$release" >/dev/null
