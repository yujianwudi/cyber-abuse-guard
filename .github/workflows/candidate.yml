name: Candidate build - NOT A RELEASE

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Exact 40-character source commit to build
        required: true
        type: string
      expected_tree:
        description: Exact 40-character source tree to build
        required: true
        type: string
      ci_run_id:
        description: Successful exact-head push CI run for the commit
        required: true
        type: string
      authorize_clean_candidate:
        description: Build an unreleased clean v0.15 Host-test candidate
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: round6-clean-candidate-${{ inputs.expected_commit }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.4'
  VERSION: '0.15'
  CYCLONEDX_GOMOD_VERSION: 'v1.9.0'
  GOVULNCHECK_VERSION: 'v1.6.0'

jobs:
  admission:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Bind dispatch to the exact main tip and candidate workflow
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          AUTHORIZED: ${{ inputs.authorize_clean_candidate }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
        run: |
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$CI_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$AUTHORIZED" == true ]]
          [[ "$DISPATCH_REF" == "refs/heads/main" ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_REF" == "${GITHUB_REPOSITORY}/.github/workflows/candidate.yml@${DISPATCH_REF}" ]]
      - name: Bind candidate admission to successful exact-head push CI
        env:
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          GH_TOKEN: ${{ github.token }}
        run: |
          response="$(mktemp)"
          trap 'rm -f -- "$response"' EXIT
          curl --fail-with-body --silent --show-error --location \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}" \
            --output "$response"
          jq -e \
            --arg run_id "$CI_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg expected_commit "$EXPECTED_COMMIT" \
            '(.id | tostring) == $run_id and
             .name == "CI" and
             .path == ".github/workflows/ci.yml" and
             .event == "push" and
             .head_sha == $expected_commit and
             .status == "completed" and
             .conclusion == "success" and
             .repository.full_name == $repository' \
            "$response" >/dev/null

  build:
    needs: admission
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout exact Round6-safe source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.expected_commit }}
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/cmd/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/cmd/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/cmd/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/cmd/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/cmd/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/cmd/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/docs/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]_[Rr][Ee][Pp][Oo][Rr][Tt].[Mm][Dd]
            !/docs/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/docs/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/docs/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/docs/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/internal/classifier/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/internal/classifier/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/internal/classifier/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/internal/classifier/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/internal/classifier/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/internal/classifier/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/testdata/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/testdata/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/testdata/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/testdata/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/testdata/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/testdata/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
      - name: Recheck restricted-data and workflow contracts
        run: |
          python3 -B scripts/round6_safe_gate_contract_test.py
          python3 -B scripts/round6_safe_gate_contract.py --root .
          ./scripts/release-doc-consistency.sh
      - name: Verify immutable source identity
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ -z "$(git status --porcelain)" ]]
          ! git show-ref --verify --quiet refs/tags/v0.15
      - name: Set up pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install bounded candidate dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils file jq zip unzip
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Recheck source, regressions, and pinned CPA v7.2.88 contract
        env:
          CPA_COMPAT_VERIFY_REMOTE: '1'
        run: |
          make round6-format-check round6-git-diff-check round6-module-verify round6-regression round6-vet
          go test ./internal/classifier -run '^TestClassifierPolicyIdentity$' -count=1
          make cpa-latest-compat
      - name: Build exact clean unreleased Host-test assets
        env:
          RELEASE_CANDIDATE_BUILD: '1'
          RELEASE_CANDIDATE_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_CANDIDATE_EXPECTED_TREE: ${{ inputs.expected_tree }}
          RELEASE_CANDIDATE_WORKFLOW_SHA: ${{ github.workflow_sha }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          REQUIRE_DIST_ARTIFACTS: '1'
        run: ./scripts/round6-candidate-artifacts.sh
      - name: Rebuild candidate in two clean clones and compare bytes
        env:
          RELEASE_CANDIDATE_BUILD: '1'
          RELEASE_CANDIDATE_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_CANDIDATE_EXPECTED_TREE: ${{ inputs.expected_tree }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
        run: make round6-reproducibility-test
      - name: Reverify candidate identity and source cleanliness
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          jq -e \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            '.status == "UNRELEASED / HOST AND INDEPENDENT AUDIT REQUIRED" and
             .version == "0.15" and .commit == $commit and .tree == $tree and
             (.artifacts.so.sha256 | test("^[0-9a-f]{64}$")) and
             (.artifacts.store_zip.sha256 | test("^[0-9a-f]{64}$"))' \
            dist/candidate-manifest.json >/dev/null
          make clean-tree-check
      - name: Upload private exact-commit candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: round6-v0.15-candidate-${{ inputs.expected_commit }}
          path: |
            dist/cyber-abuse-guard-v0.15.so
            dist/cyber-abuse-guard-v0.15.so.sha256
            dist/cyber-abuse-guard_0.15_linux_amd64.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/candidate-manifest.json
          if-no-files-found: error
          retention-days: 30
