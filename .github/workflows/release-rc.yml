                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-rc.yml" \
                --signer-digest "$EXPECTED_COMMIT" \
                --source-ref "refs/tags/$TAG" \
                --source-digest "$EXPECTED_COMMIT" >/dev/null; then
