      - name: Recheck immutable tag and main before publication
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          immutability="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/immutable-releases")"
          [[ "$(jq -r '.enabled' <<<"$immutability")" == true ]]
          latest_tag="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq '.tag_name')"
          [[ "$latest_tag" == v0.15 ]]
          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]

      - name: Create, byte-check, and publish v0.16-rc.2 prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          BUILD_RUNNER_LABEL: ${{ needs.build.outputs.runner_label }}
          BUILD_RUNNER_OS: ${{ needs.build.outputs.runner_os }}
          BUILD_RUNNER_ARCH: ${{ needs.build.outputs.runner_arch }}
          BUILD_RUNNER_ENVIRONMENT: ${{ needs.build.outputs.runner_environment }}
          BUILD_RUNNER_NAME: ${{ needs.build.outputs.runner_name }}
          BUILD_RUNNER_IMAGE_OS: ${{ needs.build.outputs.runner_image_os }}
          BUILD_RUNNER_IMAGE_VERSION: ${{ needs.build.outputs.runner_image_version }}
        run: |
          set -euo pipefail
          release_id=''
          verify_dir=''
          cleanup_publication_exit() {
            local status=$?
            trap - EXIT INT TERM
            set +e
            if [[ -n "$verify_dir" && -d "$verify_dir" && ! -L "$verify_dir" ]]; then
              rm -rf -- "$verify_dir"
            fi
            exit "$status"
          }
          trap cleanup_publication_exit EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM
          gh_json_with_retry() {
            local endpoint="$1" attempt response
            for attempt in 1 2 3 4 5; do
              if response="$(gh api \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "$endpoint")"; then
                printf '%s' "$response"
                return 0
              fi
              sleep "$attempt"
            done
            return 1
          }
          assert_remote_identity() {
            local immutability latest_tag main_ref tag_ref tag_object_sha tag_object commit_object formal_refs ci_response
            immutability="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/immutable-releases")"
            [[ "$(jq -r '.enabled' <<<"$immutability")" == true ]]
            latest_tag="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/releases/latest" | jq -er '.tag_name')"
            [[ "$latest_tag" == v0.15 ]]
            main_ref="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
            [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
            [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
            tag_ref="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
            [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
            tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
            [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
            tag_object="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
            [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
            [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
            commit_object="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
            [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]
            formal_refs="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v0.16")"
            jq -e '[.[] | select(.ref == "refs/tags/v0.16")] | length == 0' \
              <<<"$formal_refs" >/dev/null
            ci_response="$(gh_json_with_retry \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
            jq -e \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg commit "$EXPECTED_COMMIT" \
              --argjson run_id "$CI_RUN_ID" \
              --argjson run_attempt "$CI_RUN_ATTEMPT" '
                .id == $run_id and
                .run_attempt == $run_attempt and
                .name == "CI" and
                .path == ".github/workflows/ci.yml" and
                .event == "push" and
                .head_branch == "main" and
                .head_sha == $commit and
                .status == "completed" and
                .conclusion == "success" and
                .repository.full_name == $repository
              ' <<<"$ci_response" >/dev/null
          }

          notes="$RUNNER_TEMP/rc-release-notes.md"
          cat >"$notes" <<EOF
          Linux amd64 prerelease with privacy-safe CPA Host counted-Mock evidence.

          - Source commit: \`$EXPECTED_COMMIT\`
          - Exact-main CI: https://github.com/${GITHUB_REPOSITORY}/actions/runs/$CI_RUN_ID
            (attempt $CI_RUN_ATTEMPT)
          - CPA primary target: v7.2.95 (\`f71ec0eb6776854457892452cf28c47f0d658251\`)
          - Store package: \`cyber-abuse-guard_0.16-rc.2_linux_amd64.zip\`
          - Packaging: 19-asset formal structure with audit bundle, source archive,
            SBOM, checksums, internal test summary, RC evidence, exact manifest,
            and the SHA-bound Round 8 Host evidence plus sidecar
          - Builder container: ${RC_BUILDER_REFERENCE}
          - Build runner context: label ${BUILD_RUNNER_LABEL}; OS ${BUILD_RUNNER_OS};
            arch ${BUILD_RUNNER_ARCH}; environment ${BUILD_RUNNER_ENVIRONMENT};
            name \`${BUILD_RUNNER_NAME}\`
          - Build runner host image OS/version: ${BUILD_RUNNER_IMAGE_OS} /
            ${BUILD_RUNNER_IMAGE_VERSION}; the immutable builder container above
            is the authoritative compiler-environment identity
          - Artifact provenance: GitHub signed build attestations generated and verified
          - Release immutability: required; GitHub locks assets and tag after publication
          - Internal Linux gates: passed in this release workflow
          - CPA v7.2.95 primary counted-Mock Host evidence: GitHub-attested protected workflow, schema/run/artifact verified
          - Primary protocol requests: Chat benign/malicious 1/0; Responses benign/malicious 1/0
          - Primary corpus matrix: 42/42 benign passed; 42/42 paired malicious blocked
          - Primary coverage: stream, nonstream, audit, balanced, and strict passed
          - Primary policy outcomes: Balanced incomplete allowed; Strict incomplete blocked; usage queue allow delta 1 and blocked zero
          - Primary DB/lifecycle: schema v5, migration history 1-5, quick_check ok, WAL checkpoint passed, restart cycle passed
          - Primary Raw Capture: only-blocked, TTL dedup, schema-v3 redaction metadata, and purge/WAL passed
          - Real Provider contacted: no
          - Production accessed: no
          - Unexpected restart/OOM/panic/fatal/plugin errors: 0 / false / 0 / 0 / 0

          This prerelease is Linux amd64 only. There is no stable v0.16 release.
          Phase 2 Host evidence was generated and signed by the protected Round 8 Host
          workflow. Publication binds its signer workflow, tag, commit, run, artifact
          ID/digest, challenge, Phase 1 artifact, sandbox daemon identity, and host-locality
          challenge. This trust still depends on the protected runner/environment controls;
          it is counted-Mock-only and is not real Provider or production validation. Independent audit and
          independent evaluation remain required and NOT_PROVIDED; production approval
          has not been granted.
          EOF
          release_title='v0.16-rc.2 - independent audit and Linux sandbox validation required'
          expected_body="$(cat "$notes")"

          phase1_assets=(
            dist/cyber-abuse-guard-v0.16-rc.2.so
            dist/cyber-abuse-guard-v0.16-rc.2.so.sha256
            dist/cyber-abuse-guard_0.16-rc.2_linux_amd64.zip
            dist/cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/rc-release-test-summary.txt
            dist/rc-release-test-summary.txt.sha256
            dist/rc-release-evidence.md
            dist/rc-release-evidence.md.sha256
            dist/cyber-abuse-guard-v0.16-rc.2-source.tar.gz
            dist/cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256
            dist/rc-release-manifest.json
            dist/rc-release-manifest.json.sha256
          )
          host_assets=(
            dist/round8-host-evidence.json
            dist/round8-host-evidence.json.sha256
          )
          assets=("${phase1_assets[@]}" "${host_assets[@]}")
          expected_phase1_assets="$(printf '%s\n' "${phase1_assets[@]#dist/}" | LC_ALL=C sort)"
          expected_host_assets="$(printf '%s\n' "${host_assets[@]#dist/}" | LC_ALL=C sort)"
          expected_assets="$(printf '%s\n' "${assets[@]#dist/}" | LC_ALL=C sort)"
          verify_dir="$(mktemp -d "$RUNNER_TEMP/rc-upload-check.XXXXXX")"
          download_and_compare_asset() {
            local name="$1" prefix="$2" asset_id attempt output
            asset_id="$(jq -er --arg name "$name" '
              [.assets[] | select(.name == $name)] |
              if length == 1 then .[0].id else error("missing or duplicate RC asset") end
            ' <<<"$release")"
            output="$verify_dir/$prefix-$name"
            for attempt in 1 2 3; do
              rm -f -- "$output"
              if gh api \
                --header 'Accept: application/octet-stream' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >"$output" && \
                cmp -s "dist/$name" "$output"; then
                return 0
              fi
              sleep "$attempt"
            done
            return 1
          }
          assert_remote_identity

          releases="$RUNNER_TEMP/rc-draft-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          matches="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length <= 1 then . else error("duplicate RC releases exist") end
          ' "$releases")"
          if [[ "$(jq -r 'length' <<<"$matches")" == 1 ]]; then
            release="$(jq -ce '.[0]' <<<"$matches")"
            if [[ "$(jq -r '.draft' <<<"$release")" == false ]]; then
              [[ "$(jq -r '.immutable' <<<"$release")" == true ]]
              [[ "$(jq -r '.prerelease' <<<"$release")" == true ]]
              [[ "$(jq -r '.tag_name' <<<"$release")" == "$TAG" ]]
              [[ "$(jq -r '.target_commitish' <<<"$release")" == "$EXPECTED_COMMIT" ]]
              [[ "$(jq -r '.name' <<<"$release")" == "$release_title" ]]
              [[ "$(jq -r '.body' <<<"$release")" == "$expected_body" ]]
              jq -e '
                .assets | length == 19 and
                all(.state == "uploaded") and
                ([.[].name] | length) == ([.[].name] | unique | length)
              ' <<<"$release" >/dev/null
              [[ "$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)" == "$expected_assets" ]]
              while IFS= read -r name; do
                download_and_compare_asset "$name" already-public
              done <<<"$expected_assets"
              assert_remote_identity
              printf '%s\n' 'already-public immutable RC release verified without mutation'
              exit 0
            fi
          fi
          if [[ "$(jq -r 'length' <<<"$matches")" == 0 ]]; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --target "$EXPECTED_COMMIT" \
              --title "$release_title" \
              --notes-file "$notes" \
              --draft \
              --prerelease \
              --latest=false
          fi

          releases="$RUNNER_TEMP/rc-current-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          release="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length == 1 then .[0] else error("expected exactly one RC release") end
          ' "$releases")"
          release_id="$(jq -er '.id | select(type == "number")' <<<"$release")"
          [[ "$(jq -r '.draft' <<<"$release")" == true ]] || {
            printf '%s\n' 'RC release is already public; immutable publication admission requires a draft' >&2
            exit 1
          }
          [[ "$(jq -r '.prerelease' <<<"$release")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$release")" == "$TAG" ]]
          jq -e '[.assets[].name] as $names | ($names | length) == ($names | unique | length)' \
            <<<"$release" >/dev/null
          existing_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          if [[ -n "$existing_assets" ]]; then
            unexpected_assets="$(comm -23 \
              <(printf '%s\n' "$existing_assets") \
              <(printf '%s\n' "$expected_assets"))"
            [[ -z "$unexpected_assets" ]]
          fi
          if [[ -n "$existing_assets" ]]; then
            while IFS= read -r name; do
              download_and_compare_asset "$name" preexisting
            done <<<"$existing_assets"
          fi

          missing_phase1_assets=()
          while IFS= read -r name; do
            if ! grep -Fxq -- "$name" <<<"$existing_assets"; then
              missing_phase1_assets+=("dist/$name")
            fi
          done <<<"$expected_phase1_assets"
          if (( ${#missing_phase1_assets[@]} > 0 )); then
            gh release upload "$TAG" "${missing_phase1_assets[@]}" \
              --repo "$GITHUB_REPOSITORY"
            release="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
            existing_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          fi

          existing_phase1_assets="$(comm -12 \
            <(printf '%s\n' "$existing_assets") \
            <(printf '%s\n' "$expected_phase1_assets"))"
          [[ "$existing_phase1_assets" == "$expected_phase1_assets" ]]
          while IFS= read -r name; do
            download_and_compare_asset "$name" phase1
          done <<<"$expected_phase1_assets"
          phase1_fingerprint="$(jq -c '
            [.assets[] |
             select(.name != "round8-host-evidence.json" and
                    .name != "round8-host-evidence.json.sha256") |
             {id, name, size, digest}] | sort_by(.name)
          ' <<<"$release")"

          missing_host_assets=()
          while IFS= read -r name; do
            if grep -Fxq -- "$name" <<<"$existing_assets"; then
              download_and_compare_asset "$name" host-existing
            else
              missing_host_assets+=("dist/$name")
            fi
          done <<<"$expected_host_assets"
          if (( ${#missing_host_assets[@]} > 0 )); then
            gh release upload "$TAG" "${missing_host_assets[@]}" \
              --repo "$GITHUB_REPOSITORY"
          fi
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$EXPECTED_COMMIT" \
            --title "$release_title" \
            --notes-file "$notes" \
            --draft \
            --prerelease \
            --latest=false

          release="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          [[ "$(jq -r '.draft' <<<"$release")" == true ]]
          [[ "$(jq -r '.prerelease' <<<"$release")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$release")" == "$TAG" ]]
          [[ "$(jq -r '.target_commitish' <<<"$release")" == "$EXPECTED_COMMIT" ]]
          [[ "$(jq -r '.name' <<<"$release")" == "$release_title" ]]
          [[ "$(jq -r '.body' <<<"$release")" == "$expected_body" ]]
          actual_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          [[ "$actual_assets" == "$expected_assets" ]]
          [[ "$(jq -c '
            [.assets[] |
             select(.name != "round8-host-evidence.json" and
                    .name != "round8-host-evidence.json.sha256") |
             {id, name, size, digest}] | sort_by(.name)
          ' <<<"$release")" == "$phase1_fingerprint" ]]

          while IFS= read -r name; do
            download_and_compare_asset "$name" final
          done <<<"$expected_assets"

          draft_fingerprint="$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$release")"
          assert_remote_identity
          current="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          [[ "$(jq -r '.draft' <<<"$current")" == true ]] || {
            printf '%s\n' 'RC release became public before the authorized immutable publish operation' >&2
            exit 1
          }
          [[ "$(jq -r '.prerelease' <<<"$current")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$current")" == "$TAG" ]]
          [[ "$(jq -r '.target_commitish' <<<"$current")" == "$EXPECTED_COMMIT" ]]
          [[ "$(jq -r '.name' <<<"$current")" == "$release_title" ]]
          [[ "$(jq -r '.body' <<<"$current")" == "$expected_body" ]]
          [[ "$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$current")" == "$draft_fingerprint" ]]
          publish_response=''
          publish_request_returned=0
          if publish_response="$(gh api --method PATCH \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -F prerelease=true \
            -f make_latest=false \
            -f name="$release_title" \
            -f body="$expected_body" \
            -f tag_name="$TAG" \
            -f target_commitish="$EXPECTED_COMMIT")"; then
            publish_request_returned=1
          fi

          final=''
          for attempt in 1 2 3 4 5; do
            if candidate_final="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" 2>/dev/null)" && \
              [[ "$(jq -r '.draft' <<<"$candidate_final")" == false ]] && \
              [[ "$(jq -r '.immutable' <<<"$candidate_final")" == true ]]; then
              final="$candidate_final"
              break
            fi
            sleep "$attempt"
          done
          [[ -n "$final" ]] || {
            printf '%s\n' 'immutable RC publication did not reach a verifiable public terminal state' >&2
            exit 1
          }
          if [[ "$publish_request_returned" == 1 ]] && \
            publish_response_id="$(jq -er '.id | select(type == "number")' \
              <<<"$publish_response" 2>/dev/null)"; then
            [[ "$publish_response_id" == "$release_id" ]]
          fi
          assert_remote_identity
          [[ "$(jq -r '.prerelease' <<<"$final")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$final")" == "$TAG" ]]
          [[ "$(jq -r '.target_commitish' <<<"$final")" == "$EXPECTED_COMMIT" ]]
          [[ "$(jq -r '.name' <<<"$final")" == "$release_title" ]]
          [[ "$(jq -r '.body' <<<"$final")" == "$expected_body" ]]
          jq -e '.assets | length == 19 and all(.state == "uploaded")' <<<"$final" >/dev/null
          [[ "$(jq -r '.assets[].name' <<<"$final" | LC_ALL=C sort)" == "$expected_assets" ]]
          [[ "$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$final")" == "$draft_fingerprint" ]]
          release="$final"
          while IFS= read -r name; do
            download_and_compare_asset "$name" immutable-final
          done <<<"$expected_assets"

  verify_published:
    needs: admission
    if: ${{ needs.admission.outputs.already_public == 'true' }}
    permissions:
      actions: read
      attestations: read
      contents: read
    runs-on: ubuntu-24.04
    container:
      image: docker.io/library/golang:1.26.4-bookworm@sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b
    timeout-minutes: 120
    steps:
      - name: Checkout exact RC tag with restricted data excluded
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/cmd/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/cmd/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/cmd/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/cmd/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/cmd/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/cmd/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/docs/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]_[Rr][Ee][Pp][Oo][Rr][Tt].[Mm][Dd]
            !/docs/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/docs/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/docs/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/docs/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/internal/classifier/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/internal/classifier/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/internal/classifier/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/internal/classifier/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/internal/classifier/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/internal/classifier/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/testdata/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/testdata/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/testdata/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/testdata/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/testdata/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/testdata/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*

      - name: Recheck restricted-data and workflow contracts
        run: |
          python3 -B scripts/round6_safe_gate_contract_test.py
          python3 -B scripts/round6_safe_gate_contract.py --root .

      - name: Verify immutable public-rebuild source identity
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == "refs/tags/$TAG" ]]
          [[ "$GITHUB_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$GITHUB_WORKFLOW_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ "$(git cat-file -t "refs/tags/$TAG")" == tag ]]
          [[ "$(git rev-parse "$TAG^{tag}")" == "$EXPECTED_TAG_OBJECT" ]]
          [[ "$(git rev-list -n 1 "$TAG")" == "$EXPECTED_COMMIT" ]]
          ! git show-ref --verify --quiet refs/tags/v0.16

      - name: Set up pinned Go without cache writes
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install bounded public-rebuild dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y build-essential binutils ca-certificates curl file git jq zip unzip nginx
          mkdir -p "$RUNNER_TEMP/bin"
          gh_archive="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          gh_root="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$gh_archive" \
            "https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          printf '%s  %s\n' "$GH_CLI_LINUX_AMD64_SHA256" "$gh_archive" | sha256sum -c -
          tar -xzf "$gh_archive" -C "$RUNNER_TEMP" "gh_${GH_CLI_VERSION}_linux_amd64/bin/gh"
          install -m 0755 "$gh_root/bin/gh" /usr/local/bin/gh
          gh --version
          gh help attestation >/dev/null
          # shellcheck disable=SC2086
          GOBIN="$RUNNER_TEMP/bin" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}
          # shellcheck disable=SC2086
          GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Download and bind the immutable public RC without mutation
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
        run: |
          set -euo pipefail
          expected_assets="$(printf '%s\n' \
            build-metadata.json \
            checksums.txt \
            cyber-abuse-guard-v0.16-rc.2.so \
            cyber-abuse-guard-v0.16-rc.2.so.sha256 \
            cyber-abuse-guard_0.16-rc.2_linux_amd64.zip \
            cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip \
            cyber-abuse-guard-v0.16-rc.2-source.tar.gz \
            cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256 \
            rc-release-evidence.md \
            rc-release-evidence.md.sha256 \
            rc-release-manifest.json \
            rc-release-manifest.json.sha256 \
            rc-release-test-summary.txt \
            rc-release-test-summary.txt.sha256 \
            round8-host-evidence.json \
            round8-host-evidence.json.sha256 \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json | LC_ALL=C sort)"

          notes="$RUNNER_TEMP/rc-public-verification-notes.md"
          cat >"$notes" <<EOF
          Linux amd64 prerelease with privacy-safe CPA Host counted-Mock evidence.

          - Source commit: \`$EXPECTED_COMMIT\`
          - Exact-main CI: https://github.com/${GITHUB_REPOSITORY}/actions/runs/$CI_RUN_ID
            (attempt $CI_RUN_ATTEMPT)
          - CPA primary target: v7.2.95 (\`f71ec0eb6776854457892452cf28c47f0d658251\`)
          - Store package: \`cyber-abuse-guard_0.16-rc.2_linux_amd64.zip\`
          - Packaging: 19-asset formal structure with audit bundle, source archive,
            SBOM, checksums, internal test summary, RC evidence, exact manifest,
            and the SHA-bound Round 8 Host evidence plus sidecar
          - Builder container: ${RC_BUILDER_REFERENCE}
          - Build runner context: label ubuntu-24.04; OS Linux;
            arch X64; environment github-hosted;
            name \`UNRECORDED_EPHEMERAL_GITHUB_HOSTED_RUNNER\`
          - Build runner host image OS/version: UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER /
            UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER; the immutable builder container above
            is the authoritative compiler-environment identity
          - Artifact provenance: GitHub signed build attestations generated and verified
          - Release immutability: required; GitHub locks assets and tag after publication
          - Internal Linux gates: passed in this release workflow
          - CPA v7.2.95 primary counted-Mock Host evidence: GitHub-attested protected workflow, schema/run/artifact verified
          - Primary protocol requests: Chat benign/malicious 1/0; Responses benign/malicious 1/0
          - Primary corpus matrix: 42/42 benign passed; 42/42 paired malicious blocked
          - Primary coverage: stream, nonstream, audit, balanced, and strict passed
          - Primary policy outcomes: Balanced incomplete allowed; Strict incomplete blocked; usage queue allow delta 1 and blocked zero
          - Primary DB/lifecycle: schema v5, migration history 1-5, quick_check ok, WAL checkpoint passed, restart cycle passed
          - Primary Raw Capture: only-blocked, TTL dedup, schema-v3 redaction metadata, and purge/WAL passed
          - Real Provider contacted: no
          - Production accessed: no
          - Unexpected restart/OOM/panic/fatal/plugin errors: 0 / false / 0 / 0 / 0

          This prerelease is Linux amd64 only. There is no stable v0.16 release.
          Phase 2 Host evidence was generated and signed by the protected Round 8 Host
          workflow. Publication binds its signer workflow, tag, commit, run, artifact
          ID/digest, challenge, Phase 1 artifact, sandbox daemon identity, and host-locality
          challenge. This trust still depends on the protected runner/environment controls;
          it is counted-Mock-only and is not real Provider or production validation. Independent audit and
          independent evaluation remain required and NOT_PROVIDED; production approval
          has not been granted.
          EOF
          release_title='v0.16-rc.2 - independent audit and Linux sandbox validation required'
          expected_body="$(cat "$notes")"

          immutability="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/immutable-releases")"
          [[ "$(jq -r '.enabled' <<<"$immutability")" == true ]]
          latest_tag="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          [[ "$latest_tag" == v0.15 ]]
          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]
          formal_refs="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v0.16")"
          jq -e '[.[] | select(.ref == "refs/tags/v0.16")] | length == 0' \
            <<<"$formal_refs" >/dev/null
          ci_response="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson run_attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and .run_attempt == $run_attempt and
              .name == "CI" and .path == ".github/workflows/ci.yml" and
              .event == "push" and .head_branch == "main" and
              .head_sha == $commit and .status == "completed" and
              .conclusion == "success" and .repository.full_name == $repository
            ' <<<"$ci_response" >/dev/null

          releases="$RUNNER_TEMP/rc-public-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          release="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length == 1 then .[0] else error("expected exactly one public RC release") end
          ' "$releases")"
          jq -e \
            --arg commit "$EXPECTED_COMMIT" \
            --arg title "$release_title" \
            --arg body "$expected_body" '
              .draft == false and .immutable == true and .prerelease == true and
              .target_commitish == $commit and .name == $title and .body == $body and
              (.assets |
                length == 19 and all(.state == "uploaded") and
                ([.[].name] | length) == ([.[].name] | unique | length))
            ' <<<"$release" >/dev/null
          actual_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          [[ "$actual_assets" == "$expected_assets" ]]
          jq -c '{
            id, tag_name, target_commitish, name, body, draft, prerelease, immutable,
            assets: ([.assets[] | {id, name, size, digest, state}] | sort_by(.name))
          }' <<<"$release" >"$RUNNER_TEMP/rc-public-release-fingerprint.json"

          published="$RUNNER_TEMP/published"
          umask 077
          mkdir -p "$published"
          while IFS= read -r name; do
            asset="$(jq -ce --arg name "$name" '
              [.assets[] | select(.name == $name)] |
              if length == 1 then .[0] else error("missing or duplicate public RC asset") end
            ' <<<"$release")"
            asset_id="$(jq -er '.id | select(type == "number")' <<<"$asset")"
            expected_size="$(jq -er '.size | select(type == "number" and . >= 0)' <<<"$asset")"
            expected_digest="$(jq -er '.digest | select(type == "string" and test("^sha256:[0-9a-f]{64}$"))' <<<"$asset")"
            downloaded=0
            for attempt in 1 2 3; do
              output="$published/$name"
              rm -f -- "$output"
              if gh api \
                --header 'Accept: application/octet-stream' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >"$output" &&
                [[ "$(stat -c '%s' "$output")" == "$expected_size" ]] &&
                [[ "sha256:$(sha256sum "$output" | awk '{print $1}')" == "$expected_digest" ]]; then
                downloaded=1
                break
              fi
              sleep "$attempt"
            done
            [[ "$downloaded" == 1 ]]
          done <<<"$expected_assets"
          chmod 0644 "$published"/*
          install -m 0644 "$published/round8-host-evidence.json" \
            "$RUNNER_TEMP/round8-host-evidence.json"
          install -m 0644 "$published/round8-host-evidence.json.sha256" \
            "$RUNNER_TEMP/round8-host-evidence.json.sha256"
          (
            cd "$RUNNER_TEMP"
            sha256sum -c round8-host-evidence.json.sha256
          )

      - name: Run complete Linux public-rebuild gates and write canonical summary
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          CPA_COMPAT_PROFILE: 'primary'
          CPA_COMPAT_VERIFY_REMOTE: '1'
        run: |
          set -euo pipefail
          summary="$RUNNER_TEMP/rc-release-test-summary.txt"
          make round6-format-check round6-git-diff-check round6-module-verify
          make cpa-host-fixture-contract
          make round4-regression round5-regression round6-regression
          make unit-test race round6-vet fuzz-smoke round6-script-test
          make management-proxy-413-test corpus-regression
          make development-public-jailbreak-corpus round6-benchmark round6-vulncheck
          go test ./internal/classifier -run '^TestClassifierPolicyIdentity$' -count=1
          make cpa-latest-compat
          # shellcheck disable=SC2086
          make ARTIFACT_VERSION=${RC_VERSION} integration-test
          make clean-tree-check
          umask 077
          printf '%s\n' \
            'CPA Cyber Abuse Guard v0.16-rc.2 canonical internal Linux release gates' \
            'summary_schema=1' \
            "commit=$RELEASE_RC_EXPECTED_COMMIT" \
            "tree=$RELEASE_RC_EXPECTED_TREE" \
            "exact_main_ci_run=$CI_RUN_ID" \
            "exact_main_ci_attempt=$CI_RUN_ATTEMPT" \
            'rc_gate.safe_contract=PASS' \
            'rc_gate.full_linux_quality=PASS' \
            'rc_gate.cpa_v7.2.95_primary_source_compatibility=PASS' \
            'rc_gate.rc_integration=PASS' \
            'rc_gate.clean_tree=PASS' \
            'dynamic_stdout_included=false' \
            'wall_clock_timing_included=false' \
            'benchmark_measurements_included=false' >"$summary"
          chmod 0600 "$summary"

      - name: Rebuild the exact 19-asset public candidate locally
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          RELEASE_RC_WORKFLOW_SHA: ${{ github.workflow_sha }}
          RC_CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          RC_CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          RC_TEST_SUMMARY_INPUT: ${{ runner.temp }}/rc-release-test-summary.txt
          RC_PUBLISH_RELEASE: 'true'
          RC_HOST_EVIDENCE_INPUT: ${{ runner.temp }}/round8-host-evidence.json
          RC_HOST_EVIDENCE_SIDECAR_INPUT: ${{ runner.temp }}/round8-host-evidence.json.sha256
          RC_RUNNER_LABEL: 'ubuntu-24.04'
          RC_RUNNER_OS: ${{ runner.os }}
          RC_RUNNER_ARCH: ${{ runner.arch }}
          RC_RUNNER_ENVIRONMENT: ${{ runner.environment }}
          RC_RUNNER_NAME: 'UNRECORDED_EPHEMERAL_GITHUB_HOSTED_RUNNER'
          RC_RUNNER_IMAGE_OS: 'UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER'
          RC_RUNNER_IMAGE_VERSION: 'UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER'
          ROUND6_SAFE_SPARSE_BUILD: '1'
          REQUIRE_DIST_ARTIFACTS: '1'
        run: ./scripts/round6-rc-artifacts.sh

      - name: Byte-compare rebuilt and published assets and recheck public identity
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            build-metadata.json \
            checksums.txt \
            cyber-abuse-guard-v0.16-rc.2.so \
            cyber-abuse-guard-v0.16-rc.2.so.sha256 \
            cyber-abuse-guard_0.16-rc.2_linux_amd64.zip \
            cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip \
            cyber-abuse-guard-v0.16-rc.2-source.tar.gz \
            cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256 \
            rc-release-evidence.md \
            rc-release-evidence.md.sha256 \
            rc-release-manifest.json \
            rc-release-manifest.json.sha256 \
            rc-release-test-summary.txt \
            rc-release-test-summary.txt.sha256 \
            round8-host-evidence.json \
            round8-host-evidence.json.sha256 \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json | LC_ALL=C sort)"
          published="$RUNNER_TEMP/published"
          actual_local="$(find dist -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          actual_published="$(find "$published" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual_local" == "$expected" ]]
          [[ "$actual_published" == "$expected" ]]
          while IFS= read -r name; do
            [[ -f "dist/$name" && ! -L "dist/$name" ]]
            [[ -f "$published/$name" && ! -L "$published/$name" ]]
            cmp -s "dist/$name" "$published/$name"
          done <<<"$expected"
          (cd dist && sha256sum -c checksums.txt && \
            sha256sum -c cyber-abuse-guard-v0.16-rc.2.so.sha256 && \
            sha256sum -c ruleset.sha256 && \
            sha256sum -c rc-release-test-summary.txt.sha256 && \
            sha256sum -c rc-release-evidence.md.sha256 && \
            sha256sum -c cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256 && \
            sha256sum -c round8-host-evidence.json.sha256 && \
            sha256sum -c rc-release-manifest.json.sha256)
          (
            cd "$published"
            sha256sum -c checksums.txt
            sha256sum -c cyber-abuse-guard-v0.16-rc.2.so.sha256
            sha256sum -c ruleset.sha256
            sha256sum -c rc-release-test-summary.txt.sha256
            sha256sum -c rc-release-evidence.md.sha256
            sha256sum -c cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256
            sha256sum -c round8-host-evidence.json.sha256
            sha256sum -c rc-release-manifest.json.sha256
          )
          ordinary_assets="$(grep -Fvx \
            -e round8-host-evidence.json \
            -e round8-host-evidence.json.sha256 <<<"$expected")"
          [[ "$(grep -c . <<<"$ordinary_assets")" == 17 ]]
          while IFS= read -r name; do
            verified=0
            for attempt in 1 2 3; do
              if gh attestation verify "$published/$name" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-rc.yml" \
                --signer-digest "$EXPECTED_COMMIT" \
                --source-ref "refs/tags/$TAG" \
                --source-digest "$EXPECTED_COMMIT" >/dev/null; then
                verified=1
                break
              fi
              sleep "$attempt"
            done
            [[ "$verified" == 1 ]]
          done <<<"$ordinary_assets"
          for name in round8-host-evidence.json round8-host-evidence.json.sha256; do
            verified=0
            for attempt in 1 2 3; do
              if gh attestation verify "$published/$name" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/round8-host-validation.yml" \
                --signer-digest "$EXPECTED_COMMIT" \
                --source-ref "refs/tags/$TAG" \
                --source-digest "$EXPECTED_COMMIT" >/dev/null; then
                verified=1
                break
              fi
              sleep "$attempt"
            done
            [[ "$verified" == 1 ]]
          done

          latest_tag="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"
          [[ "$latest_tag" == v0.15 ]]
          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_ref")" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${EXPECTED_TAG_OBJECT}")"
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]
          ci_response="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson run_attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and .run_attempt == $run_attempt and
              .name == "CI" and .path == ".github/workflows/ci.yml" and
              .event == "push" and .head_branch == "main" and
              .head_sha == $commit and .status == "completed" and
              .conclusion == "success" and .repository.full_name == $repository
            ' <<<"$ci_response" >/dev/null
          releases="$RUNNER_TEMP/rc-public-final-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          release="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length == 1 then .[0] else error("expected exactly one public RC release") end
          ' "$releases")"
          jq -c '{
            id, tag_name, target_commitish, name, body, draft, prerelease, immutable,
            assets: ([.assets[] | {id, name, size, digest, state}] | sort_by(.name))
          }' <<<"$release" >"$RUNNER_TEMP/rc-public-release-final-fingerprint.json"
          cmp -s "$RUNNER_TEMP/rc-public-release-fingerprint.json" \
            "$RUNNER_TEMP/rc-public-release-final-fingerprint.json"
          printf '%s\n' 'immutable public RC rebuilt and byte-compared read-only; no remote state mutation executed'
