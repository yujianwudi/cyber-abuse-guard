name: RC release v0.16-rc.2 - Linux sandbox validation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated RC tag (must be v0.16-rc.2)
        required: true
        type: string
      expected_tag_object_sha:
        description: Exact 40-character annotated tag object SHA
        required: true
        type: string
      expected_commit:
        description: Exact 40-character main commit at the RC tag
        required: true
        type: string
      expected_tree:
        description: Exact 40-character source tree at the RC tag
        required: true
        type: string
      ci_run:
        description: Successful exact-main push CI run and attempt as RUN_ID:RUN_ATTEMPT
        required: true
        type: string
      publish_rc_release:
        description: False builds a private Host-test candidate; true publishes after verified Host evidence
        required: true
        type: boolean
        default: false
      host_run:
        description: Protected Round 8 Host validation run and attempt as RUN_ID:RUN_ATTEMPT; required only when publishing
        required: false
        type: string
      host_artifact_id:
        description: Exact attested Host evidence artifact ID; required only when publishing
        required: false
        type: string
      host_artifact_digest:
        description: Exact sha256 digest reported by GitHub for the Host evidence artifact ZIP
        required: false
        type: string
      host_challenge:
        description: Fresh lowercase 64-hex challenge bound into the Host workflow evidence
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: rc-release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.4'
  VERSION: '0.16'
  RC_VERSION: '0.16-rc.2'
  CYCLONEDX_GOMOD_VERSION: 'v1.9.0'
  GOVULNCHECK_VERSION: 'v1.6.0'
  GH_CLI_VERSION: '2.96.0'
  GH_CLI_LINUX_AMD64_SHA256: '83d5c2ccad5498f58bf6368acb1ab32588cf43ab3a4b1c301bf36328b1c8bd60'
  RC_BUILDER_IMAGE: 'docker.io/library/golang:1.26.4-bookworm'
  RC_BUILDER_IMAGE_DIGEST: 'sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b'
  RC_BUILDER_REFERENCE: 'docker.io/library/golang:1.26.4-bookworm@sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b'

jobs:
  admission:
    outputs:
      already_public: ${{ steps.release_state.outputs.already_public }}
      ci_run_id: ${{ steps.release_state.outputs.ci_run_id }}
      ci_run_attempt: ${{ steps.release_state.outputs.ci_run_attempt }}
      host_run_id: ${{ steps.release_state.outputs.host_run_id }}
      host_run_attempt: ${{ steps.release_state.outputs.host_run_attempt }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Bind RC authorization to annotated exact-main tag before checkout
        id: release_state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          PUBLISH_RC_RELEASE: ${{ inputs.publish_rc_release }}
          CI_RUN: ${{ inputs.ci_run }}
          HOST_RUN: ${{ inputs.host_run }}
          HOST_ARTIFACT_ID: ${{ inputs.host_artifact_id }}
          HOST_ARTIFACT_DIGEST: ${{ inputs.host_artifact_digest }}
          HOST_CHALLENGE: ${{ inputs.host_challenge }}
        run: |
          set -euo pipefail
          [[ "$CI_RUN" =~ ^([1-9][0-9]*):([1-9][0-9]*)$ ]]
          CI_RUN_ID="${BASH_REMATCH[1]}"
          CI_RUN_ATTEMPT="${BASH_REMATCH[2]}"
          HOST_RUN_ID=
          HOST_RUN_ATTEMPT=
          if [[ -n "$HOST_RUN" ]]; then
            [[ "$HOST_RUN" =~ ^([1-9][0-9]*):([1-9][0-9]*)$ ]]
            HOST_RUN_ID="${BASH_REMATCH[1]}"
            HOST_RUN_ATTEMPT="${BASH_REMATCH[2]}"
          fi
          [[ "$PUBLISH_RC_RELEASE" == true || "$PUBLISH_RC_RELEASE" == false ]]
          [[ "$TAG" == v0.16-rc.2 ]]
          [[ "$EXPECTED_TAG_OBJECT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_REF" == "refs/tags/$TAG" ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_REF" == "${GITHUB_REPOSITORY}/.github/workflows/release-rc.yml@refs/tags/$TAG" ]]

          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]

          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]

          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]

          formal_refs="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v0.16")"
          jq -e '[.[] | select(.ref == "refs/tags/v0.16")] | length == 0' \
            <<<"$formal_refs" >/dev/null

          releases="$RUNNER_TEMP/rc-admission-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          matches="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length <= 1 then . else error("duplicate RC releases exist") end
          ' "$releases")"

          already_public=false
          if [[ "$(jq -r 'length' <<<"$matches")" == 1 ]]; then
            release="$(jq -ce '.[0]' <<<"$matches")"
            if [[ "$(jq -r '.draft' <<<"$release")" == true ]]; then
              jq -e '
                .prerelease == true and
                ([.assets[].name] | length) == ([.assets[].name] | unique | length) and
                ([.assets[].name] - [
                  "cyber-abuse-guard-v0.16-rc.2.so",
                  "cyber-abuse-guard-v0.16-rc.2.so.sha256",
                  "cyber-abuse-guard_0.16-rc.2_linux_amd64.zip",
                  "cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip",
                  "build-metadata.json", "checksums.txt", "ruleset-manifest.json",
                  "ruleset.sha256", "sbom.cdx.json",
                  "rc-release-test-summary.txt", "rc-release-test-summary.txt.sha256",
                  "rc-release-evidence.md", "rc-release-evidence.md.sha256",
                  "cyber-abuse-guard-v0.16-rc.2-source.tar.gz",
                  "cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256",
                  "rc-release-manifest.json", "rc-release-manifest.json.sha256",
                  "round8-host-evidence.json", "round8-host-evidence.json.sha256"
                ] | length == 0)
              ' <<<"$release" >/dev/null
            else
              jq -e --arg commit "$EXPECTED_COMMIT" '
                .immutable == true and .prerelease == true and
                .target_commitish == $commit and
                (.assets |
                  length == 19 and all(.state == "uploaded") and
                  ([.[].name] | length) == ([.[].name] | unique | length) and
                  ([.[].name] - [
                    "cyber-abuse-guard-v0.16-rc.2.so",
                    "cyber-abuse-guard-v0.16-rc.2.so.sha256",
                    "cyber-abuse-guard_0.16-rc.2_linux_amd64.zip",
                    "cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip",
                    "build-metadata.json", "checksums.txt", "ruleset-manifest.json",
                    "ruleset.sha256", "sbom.cdx.json",
                    "rc-release-test-summary.txt", "rc-release-test-summary.txt.sha256",
                    "rc-release-evidence.md", "rc-release-evidence.md.sha256",
                    "cyber-abuse-guard-v0.16-rc.2-source.tar.gz",
                    "cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256",
                    "rc-release-manifest.json", "rc-release-manifest.json.sha256",
                    "round8-host-evidence.json", "round8-host-evidence.json.sha256"
                  ] | length == 0))
              ' <<<"$release" >/dev/null
              already_public=true
            fi
          fi

          host_values=(
            "$HOST_RUN_ID" "$HOST_RUN_ATTEMPT" "$HOST_ARTIFACT_ID"
            "$HOST_ARTIFACT_DIGEST" "$HOST_CHALLENGE"
          )
          host_values_present=0
          for value in "${host_values[@]}"; do
            [[ -z "$value" ]] || host_values_present=1
          done
          if [[ "$already_public" == true && "$host_values_present" == 0 ]]; then
            :
          elif [[ "$PUBLISH_RC_RELEASE" == true ]]; then
            [[ "$HOST_RUN_ID" =~ ^[1-9][0-9]*$ ]]
            [[ "$HOST_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
            [[ "$HOST_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
            [[ "$HOST_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "$HOST_CHALLENGE" =~ ^[0-9a-f]{64}$ ]]
          else
            (( host_values_present == 0 ))
          fi
          # shellcheck disable=SC2129
          printf 'already_public=%s\n' "$already_public" >>"$GITHUB_OUTPUT"
          printf 'ci_run_id=%s\n' "$CI_RUN_ID" >>"$GITHUB_OUTPUT"
          printf 'ci_run_attempt=%s\n' "$CI_RUN_ATTEMPT" >>"$GITHUB_OUTPUT"
          printf 'host_run_id=%s\n' "$HOST_RUN_ID" >>"$GITHUB_OUTPUT"
          printf 'host_run_attempt=%s\n' "$HOST_RUN_ATTEMPT" >>"$GITHUB_OUTPUT"

      - name: Bind RC admission to successful exact-main push CI
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ steps.release_state.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ steps.release_state.outputs.ci_run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          [[ "$CI_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$CI_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          response="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson run_attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and
              .run_attempt == $run_attempt and
              .name == "CI" and
              .path == ".github/workflows/ci.yml" and
              .event == "push" and
              .head_branch == "main" and
              .head_sha == $commit and
              .status == "completed" and
              .conclusion == "success" and
              .repository.full_name == $repository
            ' <<<"$response" >/dev/null

  build:
    needs: admission
    if: ${{ needs.admission.outputs.already_public != 'true' }}
    outputs:
      runner_label: ${{ steps.runner_identity.outputs.runner_label }}
      runner_os: ${{ steps.runner_identity.outputs.runner_os }}
      runner_arch: ${{ steps.runner_identity.outputs.runner_arch }}
      runner_environment: ${{ steps.runner_identity.outputs.runner_environment }}
      runner_name: ${{ steps.runner_identity.outputs.runner_name }}
      runner_image_os: ${{ steps.runner_identity.outputs.runner_image_os }}
      runner_image_version: ${{ steps.runner_identity.outputs.runner_image_version }}
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    container:
      image: docker.io/library/golang:1.26.4-bookworm@sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b
    timeout-minutes: 120
    steps:
      - name: Checkout exact RC tag with restricted data excluded
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/cmd/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/cmd/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/cmd/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/cmd/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/cmd/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/cmd/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/docs/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]_[Rr][Ee][Pp][Oo][Rr][Tt].[Mm][Dd]
            !/docs/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/docs/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/docs/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/docs/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/internal/classifier/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/internal/classifier/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/internal/classifier/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/internal/classifier/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/internal/classifier/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/internal/classifier/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/testdata/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/testdata/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/testdata/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/testdata/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/testdata/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/testdata/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*

      - name: Bind the exact build runner context
        id: runner_identity
        env:
          RC_RUNNER_LABEL: 'ubuntu-24.04'
          RC_RUNNER_OS: ${{ runner.os }}
          RC_RUNNER_ARCH: ${{ runner.arch }}
          RC_RUNNER_ENVIRONMENT: ${{ runner.environment }}
          RC_RUNNER_NAME: 'UNRECORDED_EPHEMERAL_GITHUB_HOSTED_RUNNER'
          RC_RUNNER_IMAGE_OS: 'UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER'
          RC_RUNNER_IMAGE_VERSION: 'UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER'
        run: |
          set -euo pipefail
          unobservable='UNOBSERVABLE_FROM_PINNED_JOB_CONTAINER'
          [[ "$RC_RUNNER_LABEL" == ubuntu-24.04 ]]
          [[ "$RC_RUNNER_OS" == Linux ]]
          [[ "$RC_RUNNER_ARCH" == X64 ]]
          [[ "$RC_RUNNER_ENVIRONMENT" == github-hosted ]]
          [[ "$RC_RUNNER_NAME" == UNRECORDED_EPHEMERAL_GITHUB_HOSTED_RUNNER ]]
          [[ "$RC_RUNNER_IMAGE_OS" == "$unobservable" ]]
          [[ "$RC_RUNNER_IMAGE_VERSION" == "$unobservable" ]]
          {
            printf 'runner_label=%s\n' "$RC_RUNNER_LABEL"
            printf 'runner_os=%s\n' "$RC_RUNNER_OS"
            printf 'runner_arch=%s\n' "$RC_RUNNER_ARCH"
            printf 'runner_environment=%s\n' "$RC_RUNNER_ENVIRONMENT"
            printf 'runner_name=%s\n' "$RC_RUNNER_NAME"
            printf 'runner_image_os=%s\n' "$RC_RUNNER_IMAGE_OS"
            printf 'runner_image_version=%s\n' "$RC_RUNNER_IMAGE_VERSION"
          } >>"$GITHUB_OUTPUT"

      - name: Recheck restricted-data and workflow contracts
        run: |
          python3 -B scripts/round6_safe_gate_contract_test.py
          python3 -B scripts/round6_safe_gate_contract.py --root .
          ./scripts/release-doc-consistency.sh

      - name: Verify immutable RC source identity and annotated tag
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ -z "$(git status --porcelain)" ]]
          [[ "$(git cat-file -t "refs/tags/$TAG")" == tag ]]
          [[ "$(git rev-parse "$TAG^{tag}")" == "$EXPECTED_TAG_OBJECT" ]]
          [[ "$(git rev-list -n 1 "$TAG")" == "$EXPECTED_COMMIT" ]]
          ! git show-ref --verify --quiet refs/tags/v0.16

      - name: Set up pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install bounded RC build dependencies
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y build-essential binutils ca-certificates curl file git jq zip unzip nginx
          mkdir -p "$RUNNER_TEMP/bin"
          gh_archive="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          gh_root="$RUNNER_TEMP/gh_${GH_CLI_VERSION}_linux_amd64"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$gh_archive" \
            "https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/gh_${GH_CLI_VERSION}_linux_amd64.tar.gz"
          printf '%s  %s\n' "$GH_CLI_LINUX_AMD64_SHA256" "$gh_archive" | sha256sum -c -
          tar -xzf "$gh_archive" -C "$RUNNER_TEMP" "gh_${GH_CLI_VERSION}_linux_amd64/bin/gh"
          install -m 0755 "$gh_root/bin/gh" /usr/local/bin/gh
          gh --version
          gh help attestation >/dev/null
          # shellcheck disable=SC2086
          GOBIN="$RUNNER_TEMP/bin" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}
          # shellcheck disable=SC2086
          GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Download and verify publication-only attested Host evidence
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLISH_RC_RELEASE: ${{ inputs.publish_rc_release }}
          TAG: ${{ inputs.tag }}
          HOST_RUN_ID: ${{ needs.admission.outputs.host_run_id }}
          HOST_RUN_ATTEMPT: ${{ needs.admission.outputs.host_run_attempt }}
          HOST_ARTIFACT_ID: ${{ inputs.host_artifact_id }}
          HOST_ARTIFACT_DIGEST: ${{ inputs.host_artifact_digest }}
          HOST_CHALLENGE: ${{ inputs.host_challenge }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          if [[ "$PUBLISH_RC_RELEASE" == false ]]; then
            [[ -z "$HOST_RUN_ID" && -z "$HOST_RUN_ATTEMPT" ]]
            [[ -z "$HOST_ARTIFACT_ID" && -z "$HOST_ARTIFACT_DIGEST" && -z "$HOST_CHALLENGE" ]]
            exit 0
          fi

          [[ "$PUBLISH_RC_RELEASE" == true ]]
          [[ "$HOST_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$HOST_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$HOST_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$HOST_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$HOST_CHALLENGE" =~ ^[0-9a-f]{64}$ ]]

          host_run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${HOST_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$HOST_RUN_ID" \
            --argjson run_attempt "$HOST_RUN_ATTEMPT" '
              .id == $run_id and .run_attempt == $run_attempt and
              .name == "Round 8 protected CPA Host validation" and
              .path == ".github/workflows/round8-host-validation.yml" and
              .event == "workflow_dispatch" and .head_sha == $commit and
              .status == "completed" and .conclusion == "success" and
              .repository.full_name == $repository
            ' <<<"$host_run" >/dev/null
          artifacts="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${HOST_RUN_ID}/artifacts?per_page=100")"
          expected_artifact_name="round8-host-evidence-${EXPECTED_COMMIT}-${HOST_RUN_ID}-${HOST_RUN_ATTEMPT}"
          artifact="$(jq -ce \
            --arg name "$expected_artifact_name" \
            --arg digest "$HOST_ARTIFACT_DIGEST" \
            --argjson artifact_id "$HOST_ARTIFACT_ID" \
            --argjson max_size 1048576 '
              [.artifacts[] | select(.id == $artifact_id)] |
              if length == 1 then .[0] else error("expected one Host artifact ID") end |
              select(
                .name == $name and .digest == $digest and .expired == false and
                (.size_in_bytes |
                  type == "number" and . == floor and . > 0 and . <= $max_size)
              )
            ' <<<"$artifacts")"
          [[ "$(jq -r '.workflow_run.id' <<<"$artifact")" == "$HOST_RUN_ID" ]]
          host_archive_max_bytes=1048576
          host_archive_size="$(jq -er \
            --argjson max_size "$host_archive_max_bytes" '
              .size_in_bytes |
              select(type == "number" and . == floor and . > 0 and . <= $max_size)
            ' <<<"$artifact")"

          host_dir="$RUNNER_TEMP/round8-host-artifact"
          archive="$RUNNER_TEMP/round8-host-artifact.zip"
          rm -rf -- "$host_dir" "$archive"
          umask 077
          mkdir -m 0700 -- "$host_dir"
          gh api --header 'Accept: application/octet-stream' \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${HOST_ARTIFACT_ID}/zip" >"$archive"
          downloaded_archive_size="$(stat -c '%s' "$archive")"
          [[ "$downloaded_archive_size" == "$host_archive_size" ]]
          (( downloaded_archive_size > 0 && downloaded_archive_size <= host_archive_max_bytes ))
          [[ "sha256:$(sha256sum "$archive" | awk '{print $1}')" == "$HOST_ARTIFACT_DIGEST" ]]
          python3 -B - "$archive" "$host_dir" <<'PY'
          import os
          import stat
          import sys
          import zipfile
          from pathlib import Path, PurePosixPath

          MAX_ENTRIES = 2
          MAX_ENTRY_EXPANDED_BYTES = 16384
          MAX_TOTAL_EXPANDED_BYTES = 24576
          EXPECTED_NAMES = {
              "round8-host-evidence.json",
              "round8-host-evidence.json.sha256",
          }

          archive_path = Path(sys.argv[1])
          destination = Path(sys.argv[2])
          destination_real = destination.resolve(strict=True)
          with zipfile.ZipFile(archive_path) as host_zip:
              entries = host_zip.infolist()
              if len(entries) > MAX_ENTRIES:
                  raise SystemExit("Host artifact ZIP entry count exceeds the reviewed limit")
              names = [entry.filename for entry in entries]
              if len(names) != len(set(names)):
                  raise SystemExit("Host artifact ZIP contains duplicate entry names")
              if len(entries) != MAX_ENTRIES or set(names) != EXPECTED_NAMES:
                  raise SystemExit("Host artifact ZIP must contain exactly the evidence and sidecar")

              total_declared = 0
              for entry in entries:
                  path = PurePosixPath(entry.filename)
                  mode = (entry.external_attr >> 16) & 0xFFFF
                  file_type = stat.S_IFMT(mode)
                  if (
                      path.is_absolute()
                      or ".." in path.parts
                      or len(path.parts) != 1
                      or entry.is_dir()
                      or stat.S_ISDIR(mode)
                  ):
                      raise SystemExit("Host artifact ZIP contains a directory or unsafe path")
                  if stat.S_ISLNK(mode):
                      raise SystemExit("Host artifact ZIP contains a symbolic link")
                  if file_type not in (0, stat.S_IFREG):
                      raise SystemExit("Host artifact ZIP contains a non-regular entry")
                  if entry.flag_bits & 0x1:
                      raise SystemExit("Host artifact ZIP contains an encrypted entry")
                  if entry.compress_type not in (zipfile.ZIP_STORED, zipfile.ZIP_DEFLATED):
                      raise SystemExit("Host artifact ZIP uses an unreviewed compression method")
                  if not 0 < entry.file_size <= MAX_ENTRY_EXPANDED_BYTES:
                      raise SystemExit("Host artifact ZIP entry exceeds the expanded-size limit")
                  total_declared += entry.file_size
                  if total_declared > MAX_TOTAL_EXPANDED_BYTES:
                      raise SystemExit("Host artifact ZIP total expanded size exceeds the limit")

              total_written = 0
              for entry in entries:
                  target = destination / entry.filename
                  if target.parent.resolve(strict=True) != destination_real:
                      raise SystemExit("Host artifact ZIP extraction target escapes the destination")
                  entry_written = 0
                  with host_zip.open(entry, "r") as source, target.open("xb") as output:
                      while True:
                          chunk = source.read(65536)
                          if not chunk:
                              break
                          entry_written += len(chunk)
                          total_written += len(chunk)
                          if entry_written > MAX_ENTRY_EXPANDED_BYTES:
                              raise SystemExit("Host artifact ZIP entry expanded beyond the limit")
                          if total_written > MAX_TOTAL_EXPANDED_BYTES:
                              raise SystemExit("Host artifact ZIP expanded beyond the total limit")
                          output.write(chunk)
                  if entry_written != entry.file_size:
                      raise SystemExit("Host artifact ZIP entry size does not match its metadata")
                  os.chmod(target, 0o600)
              if total_written != total_declared:
                  raise SystemExit("Host artifact ZIP expanded size does not match its metadata")
          PY
          evidence="$host_dir/round8-host-evidence.json"
          sidecar="$host_dir/round8-host-evidence.json.sha256"
          [[ -f "$evidence" && ! -L "$evidence" && -f "$sidecar" && ! -L "$sidecar" ]]
          (
            cd "$host_dir"
            sha256sum -c round8-host-evidence.json.sha256
          )
          for subject in "$evidence" "$sidecar"; do
            gh attestation verify "$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/round8-host-validation.yml" \
              --signer-digest "$EXPECTED_COMMIT" \
              --source-ref "refs/tags/$TAG" \
              --source-digest "$EXPECTED_COMMIT" >/dev/null
          done
          python3 -B - "$evidence" "$EXPECTED_COMMIT" "$EXPECTED_TREE" \
            "$HOST_RUN_ID" "$HOST_RUN_ATTEMPT" "$HOST_CHALLENGE" <<'PY'
          import json
          import re
          import sys
          import uuid
          from pathlib import Path

          path = Path(sys.argv[1])
          expected_commit = sys.argv[2]
          expected_tree = sys.argv[3]
          expected_host_run_id = int(sys.argv[4])
          expected_host_run_attempt = int(sys.argv[5])
          expected_challenge = sys.argv[6]

          def reject_duplicates(pairs):
              result = {}
              for key, value in pairs:
                  if key in result:
                      raise ValueError(f"duplicate JSON key: {key}")
                  result[key] = value
              return result

          def strict_json_equal(actual, expected):
              if type(actual) is not type(expected):
                  return False
              if isinstance(expected, dict):
                  return set(actual) == set(expected) and all(
                      strict_json_equal(actual[key], value)
                      for key, value in expected.items()
                  )
              if isinstance(expected, list):
                  return len(actual) == len(expected) and all(
                      strict_json_equal(left, right)
                      for left, right in zip(actual, expected)
                  )
              return actual == expected

          raw = path.read_bytes()
          if not 2 <= len(raw) <= 12288:
              raise SystemExit("Host evidence JSON must be between 2 and 12288 bytes")
          try:
              evidence = json.loads(raw.decode("utf-8"), object_pairs_hook=reject_duplicates)
          except (UnicodeDecodeError, json.JSONDecodeError, ValueError) as exc:
              raise SystemExit(f"invalid Host evidence JSON: {exc}") from exc
          canonical = json.dumps(
              evidence,
              ensure_ascii=False,
              sort_keys=True,
              separators=(",", ":"),
          ).encode("utf-8")
          if raw != canonical:
              raise SystemExit("Host evidence JSON must be canonical UTF-8 without trailing bytes")

          expected_host_results = {
              "protocol_requests": {
                  "chat_benign_upstream": 1,
                  "chat_malicious_upstream": 0,
                  "responses_benign_upstream": 1,
                  "responses_malicious_upstream": 0,
              },
              "matrix": {
                  "benign_total": 42,
                  "benign_passed": 42,
                  "paired_malicious_total": 42,
                  "paired_malicious_blocked": 42,
              },
              "transports": {
                  "nonstream_passed": True,
                  "stream_passed": True,
              },
              "modes": {
                  "audit_passed": True,
                  "balanced_passed": True,
                  "strict_passed": True,
              },
              "policy_outcomes": {
                  "balanced_incomplete_allow": True,
                  "strict_incomplete_block": True,
                  "usage_queue_allow_delta": 1,
                  "usage_queue_blocked_zero": True,
              },
              "database": {
                  "quick_check": "ok",
                  "schema_version": 5,
                  "migration_versions": [1, 2, 3, 4, 5],
                  "wal_checkpoint_passed": True,
              },
              "raw_capture": {
                  "only_blocked_passed": True,
                  "ttl_dedup_passed": True,
                  "schema_v3_redaction_metadata_passed": True,
                  "purge_wal_passed": True,
              },
              "lifecycle": {
                  "restart_cycle_passed": True,
                  "unexpected_restart_count": 0,
                  "oom": False,
                  "panic_count": 0,
                  "fatal_count": 0,
                  "plugin_error_count": 0,
              },
          }
          mock = evidence.get("mock") if isinstance(evidence, dict) else None
          if (
              not isinstance(mock, dict)
              or set(mock)
              != {"contract", "source", "revision", "tag", "tree", "image_id"}
              or mock.get("contract") != "round8-counted-mock/v1"
              or mock.get("source")
              != "https://github.com/yujianwudi/cyber-abuse-guard"
              or mock.get("revision") != expected_commit
              or mock.get("tag") != "v0.16-rc.2"
              or mock.get("tree") != expected_tree
              or not isinstance(mock.get("image_id"), str)
              or re.fullmatch(r"sha256:[0-9a-f]{64}", mock["image_id"]) is None
          ):
              raise SystemExit("Host evidence counted-Mock identity is invalid")

          cpa = evidence.get("cpa") if isinstance(evidence, dict) else None
          if not isinstance(cpa, dict) or set(cpa) != {"primary"}:
              raise SystemExit("Host evidence CPA identity section is invalid")
          rfc3339 = re.compile(
              r"[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}"
              r"(?:\.[0-9]+)?(?:Z|[+-][0-9]{2}:[0-9]{2})"
          )
          cpa_identities = {}
          for lane, version, revision in (
              ("primary", "v7.2.95", "f71ec0eb6776854457892452cf28c47f0d658251"),
          ):
              entry = cpa.get(lane)
              if (
                  not isinstance(entry, dict)
                  or set(entry)
                  != {
                      "version",
                      "commit",
                      "image_id",
                      "build_date",
                      "counted_mock_validation",
                      "host_results",
                  }
                  or entry.get("version") != version
                  or entry.get("commit") != revision
                  or not isinstance(entry.get("image_id"), str)
                  or re.fullmatch(r"sha256:[0-9a-f]{64}", entry["image_id"])
                  is None
                  or not isinstance(entry.get("build_date"), str)
                  or rfc3339.fullmatch(entry["build_date"]) is None
              ):
                  raise SystemExit(f"Host evidence {lane} CPA image identity is invalid")
              cpa_identities[lane] = {
                  "image_id": entry["image_id"],
                  "build_date": entry["build_date"],
              }

          execution = evidence.get("execution") if isinstance(evidence, dict) else None
          execution_keys = {
              "trust", "challenge", "execution_id", "started_at", "completed_at",
              "workflow", "phase1", "runner", "sandbox",
          }
          if not isinstance(execution, dict) or set(execution) != execution_keys:
              raise SystemExit("Host evidence execution binding schema is invalid")
          if (
              execution.get("trust") != "GITHUB_ATTESTED_ROUND8_HOST_WORKFLOW"
              or execution.get("challenge") != expected_challenge
              or not isinstance(execution.get("execution_id"), str)
          ):
              raise SystemExit("Host evidence execution trust/challenge is invalid")
          try:
              uuid.UUID(execution["execution_id"])
          except (ValueError, AttributeError) as exc:
              raise SystemExit("Host evidence execution ID is invalid") from exc
          if any(
              not isinstance(execution.get(field), str)
              or rfc3339.fullmatch(execution[field]) is None
              for field in ("started_at", "completed_at")
          ) or execution["completed_at"] < execution["started_at"]:
              raise SystemExit("Host evidence execution timestamps are invalid")
          if execution.get("workflow") != {
              "repository": "yujianwudi/cyber-abuse-guard",
              "path": ".github/workflows/round8-host-validation.yml",
              "ref": "refs/tags/v0.16-rc.2",
              "sha": expected_commit,
              "run_id": expected_host_run_id,
              "run_attempt": expected_host_run_attempt,
          }:
              raise SystemExit("Host evidence signer workflow/run binding is invalid")
          phase1 = execution.get("phase1")
          if (
              not isinstance(phase1, dict)
              or set(phase1)
              != {"workflow_path", "run_id", "run_attempt", "artifact_id", "artifact_digest"}
              or phase1.get("workflow_path") != ".github/workflows/release-rc.yml"
              or any(type(phase1.get(field)) is not int or phase1[field] <= 0 for field in ("run_id", "run_attempt", "artifact_id"))
              or not isinstance(phase1.get("artifact_digest"), str)
              or re.fullmatch(r"sha256:[0-9a-f]{64}", phase1["artifact_digest"]) is None
          ):
              raise SystemExit("Host evidence Phase 1 artifact binding is invalid")
          runner = execution.get("runner")
          if (
              not isinstance(runner, dict)
              or set(runner) != {"name", "environment", "os", "arch"}
              or not isinstance(runner.get("name"), str)
              or not 1 <= len(runner["name"]) <= 128
              or runner.get("environment") != "self-hosted"
              or runner.get("os") != "Linux"
              or runner.get("arch") != "X64"
          ):
              raise SystemExit("Host evidence runner binding is invalid")
          sandbox = execution.get("sandbox")
          sandbox_id = sandbox.get("sandbox_id") if isinstance(sandbox, dict) else None
          if (
              not isinstance(sandbox, dict)
              or set(sandbox)
              != {"sandbox_id", "daemon_id", "daemon_label", "production_label", "probe_image_id", "locality_challenge"}
              or not isinstance(sandbox_id, str)
              or re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}", sandbox_id) is None
              or not isinstance(sandbox.get("daemon_id"), str)
              or re.fullmatch(r"[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}", sandbox["daemon_id"]) is None
              or sandbox.get("daemon_label")
              != f"io.cyber-abuse-guard.round8-sandbox={sandbox_id}"
              or sandbox.get("production_label") != "io.cyber-abuse-guard.production=false"
              or not isinstance(sandbox.get("probe_image_id"), str)
              or re.fullmatch(r"sha256:[0-9a-f]{64}", sandbox["probe_image_id"]) is None
              or sandbox.get("locality_challenge") != "PASS"
          ):
              raise SystemExit("Host evidence protected sandbox binding is invalid")

          expected = {
              "schema_version": 2,
              "validation_scope": "CPA_HOST_COUNTED_MOCK_ONLY",
              "candidate": {
                  "tag": "v0.16-rc.2",
                  "commit": expected_commit,
                  "tree": expected_tree,
                  "platform": "linux/amd64",
                  "so_name": "cyber-abuse-guard-v0.16-rc.2.so",
              },
              "cpa": {
                  "primary": {
                      "version": "v7.2.95",
                      "commit": "f71ec0eb6776854457892452cf28c47f0d658251",
                      "image_id": cpa_identities["primary"]["image_id"],
                      "build_date": cpa_identities["primary"]["build_date"],
                      "counted_mock_validation": "PASS",
                      "host_results": expected_host_results,
                  },
              },
              "mock": {
                  "contract": "round8-counted-mock/v1",
                  "source": "https://github.com/yujianwudi/cyber-abuse-guard",
                  "revision": expected_commit,
                  "tag": "v0.16-rc.2",
                  "tree": expected_tree,
                  "image_id": mock["image_id"],
              },
              "safety": {
                  "real_provider_contacted": False,
                  "production_accessed": False,
                  "unexpected_restart_count": 0,
                  "oom": False,
                  "panic_count": 0,
                  "fatal_count": 0,
                  "plugin_error_count": 0,
              },
              "execution": execution,
          }
          if not isinstance(evidence, dict) or set(evidence) != set(expected):
              raise SystemExit("Host evidence top-level schema is not exact")
          candidate = evidence.get("candidate")
          if not isinstance(candidate, dict) or set(candidate) != set(expected["candidate"]) | {"so_sha256"}:
              raise SystemExit("Host evidence candidate schema is not exact")
          so_sha = candidate.get("so_sha256")
          if not isinstance(so_sha, str) or re.fullmatch(r"[0-9a-f]{64}", so_sha) is None:
              raise SystemExit("Host evidence candidate SO SHA-256 is invalid")
          candidate_without_sha = dict(candidate)
          candidate_without_sha.pop("so_sha256")
          if not strict_json_equal(candidate_without_sha, expected["candidate"]):
              raise SystemExit("Host evidence candidate identity does not match this release")
          for section in ("cpa", "mock", "safety", "execution"):
              if not strict_json_equal(evidence.get(section), expected[section]):
                  raise SystemExit(f"Host evidence {section} contract does not match")
          if not strict_json_equal(evidence.get("schema_version"), 2) or not strict_json_equal(
              evidence.get("validation_scope"), expected["validation_scope"]
          ):
              raise SystemExit("Host evidence scope/version does not match")
          PY
          phase1_run_id="$(jq -er '.execution.phase1.run_id' "$evidence")"
          phase1_run_attempt="$(jq -er '.execution.phase1.run_attempt' "$evidence")"
          phase1_artifact_id="$(jq -er '.execution.phase1.artifact_id' "$evidence")"
          phase1_artifact_digest="$(jq -er '.execution.phase1.artifact_digest' "$evidence")"
          phase1_run="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${phase1_run_id}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$phase1_run_id" \
            --argjson run_attempt "$phase1_run_attempt" '
              .id == $run_id and .run_attempt == $run_attempt and
              .path == ".github/workflows/release-rc.yml" and
              .event == "workflow_dispatch" and .head_sha == $commit and
              .status == "completed" and .conclusion == "success" and
              .repository.full_name == $repository
            ' <<<"$phase1_run" >/dev/null
          phase1_artifacts="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${phase1_run_id}/artifacts?per_page=100")"
          jq -e \
            --arg digest "$phase1_artifact_digest" \
            --argjson artifact_id "$phase1_artifact_id" \
            --argjson run_id "$phase1_run_id" '
              [.artifacts[] | select(.id == $artifact_id and .digest == $digest and .expired == false)] |
              length == 1 and .[0].workflow_run.id == $run_id
            ' <<<"$phase1_artifacts" >/dev/null
          install -m 0644 "$evidence" "$RUNNER_TEMP/round8-host-evidence.json"
          install -m 0644 "$sidecar" "$RUNNER_TEMP/round8-host-evidence.json.sha256"

      - name: Run complete Linux RC verification gates and capture summary
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          CPA_COMPAT_PROFILE: 'primary'
          CPA_COMPAT_VERIFY_REMOTE: '1'
        run: |
          set -euo pipefail
          summary="$RUNNER_TEMP/rc-release-test-summary.txt"
          make round6-format-check round6-git-diff-check round6-module-verify
          make cpa-host-fixture-contract
          make round4-regression round5-regression round6-regression
          make unit-test race round6-vet fuzz-smoke round6-script-test
          make management-proxy-413-test corpus-regression
          make development-public-jailbreak-corpus round6-benchmark round6-vulncheck
          go test ./internal/classifier -run '^TestClassifierPolicyIdentity$' -count=1
          make cpa-latest-compat
          # shellcheck disable=SC2086
          make ARTIFACT_VERSION=${RC_VERSION} integration-test
          make clean-tree-check
          umask 077
          printf '%s\n' \
            'CPA Cyber Abuse Guard v0.16-rc.2 canonical internal Linux release gates' \
            'summary_schema=1' \
            "commit=$RELEASE_RC_EXPECTED_COMMIT" \
            "tree=$RELEASE_RC_EXPECTED_TREE" \
            "exact_main_ci_run=$CI_RUN_ID" \
            "exact_main_ci_attempt=$CI_RUN_ATTEMPT" \
            'rc_gate.safe_contract=PASS' \
            'rc_gate.full_linux_quality=PASS' \
            'rc_gate.cpa_v7.2.95_primary_source_compatibility=PASS' \
            'rc_gate.rc_integration=PASS' \
            'rc_gate.clean_tree=PASS' \
            'dynamic_stdout_included=false' \
            'wall_clock_timing_included=false' \
            'benchmark_measurements_included=false' >"$summary"
          chmod 0600 "$summary"

      - name: Build and reproduce exact RC release assets
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          RELEASE_RC_WORKFLOW_SHA: ${{ github.workflow_sha }}
          RC_CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          RC_CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          RC_TEST_SUMMARY_INPUT: ${{ runner.temp }}/rc-release-test-summary.txt
          RC_PUBLISH_RELEASE: ${{ inputs.publish_rc_release }}
          RC_HOST_EVIDENCE_INPUT: ${{ runner.temp }}/round8-host-evidence.json
          RC_HOST_EVIDENCE_SIDECAR_INPUT: ${{ runner.temp }}/round8-host-evidence.json.sha256
          RC_RUNNER_LABEL: ${{ steps.runner_identity.outputs.runner_label }}
          RC_RUNNER_OS: ${{ steps.runner_identity.outputs.runner_os }}
          RC_RUNNER_ARCH: ${{ steps.runner_identity.outputs.runner_arch }}
          RC_RUNNER_ENVIRONMENT: ${{ steps.runner_identity.outputs.runner_environment }}
          RC_RUNNER_NAME: ${{ steps.runner_identity.outputs.runner_name }}
          RC_RUNNER_IMAGE_OS: ${{ steps.runner_identity.outputs.runner_image_os }}
          RC_RUNNER_IMAGE_VERSION: ${{ steps.runner_identity.outputs.runner_image_version }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          REQUIRE_DIST_ARTIFACTS: '1'
        run: ./scripts/round6-rc-artifacts.sh

      - name: Reverify RC artifact allowlist and hashes
        env:
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ needs.admission.outputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ needs.admission.outputs.ci_run_attempt }}
          PUBLISH_RC_RELEASE: ${{ inputs.publish_rc_release }}
          EXPECTED_RUNNER_LABEL: ${{ steps.runner_identity.outputs.runner_label }}
          EXPECTED_RUNNER_OS: ${{ steps.runner_identity.outputs.runner_os }}
          EXPECTED_RUNNER_ARCH: ${{ steps.runner_identity.outputs.runner_arch }}
          EXPECTED_RUNNER_ENVIRONMENT: ${{ steps.runner_identity.outputs.runner_environment }}
          EXPECTED_RUNNER_NAME: ${{ steps.runner_identity.outputs.runner_name }}
          EXPECTED_RUNNER_IMAGE_OS: ${{ steps.runner_identity.outputs.runner_image_os }}
          EXPECTED_RUNNER_IMAGE_VERSION: ${{ steps.runner_identity.outputs.runner_image_version }}
        run: |
          set -euo pipefail
          jq -e \
            --arg builder_image "$RC_BUILDER_IMAGE" \
            --arg builder_image_digest "$RC_BUILDER_IMAGE_DIGEST" \
            --arg builder_reference "$RC_BUILDER_REFERENCE" \
            --arg runner_label "$EXPECTED_RUNNER_LABEL" \
            --arg runner_os "$EXPECTED_RUNNER_OS" \
            --arg runner_arch "$EXPECTED_RUNNER_ARCH" \
            --arg runner_environment "$EXPECTED_RUNNER_ENVIRONMENT" \
            --arg runner_name "$EXPECTED_RUNNER_NAME" \
            --arg runner_image_os "$EXPECTED_RUNNER_IMAGE_OS" \
            --arg runner_image_version "$EXPECTED_RUNNER_IMAGE_VERSION" '
              .schema_version == 4 and
              .go_version == "go1.26.4" and
              .goos == "linux" and .goarch == "amd64" and .cgo_enabled == true and
              .cc_command == "gcc" and
              (.gcc_version | type == "string" and length > 0) and
              .gcc_target == "x86_64-linux-gnu" and
              (.binutils_ld_version | type == "string" and length > 0) and
              (.glibc_version | type == "string" and length > 0) and
              .builder_image == $builder_image and
              .builder_image_digest == $builder_image_digest and
              .builder_reference == $builder_reference and
              .builder_reference == ($builder_image + "@" + $builder_image_digest) and
              .runner_label == $runner_label and
              .runner_os == $runner_os and
              .runner_arch == $runner_arch and
              .runner_environment == $runner_environment and
              .runner_name == $runner_name and
              .runner_image_os == $runner_image_os and
              .runner_image_version == $runner_image_version
            ' dist/build-metadata.json >/dev/null
          expected_assets=(
            build-metadata.json
            checksums.txt
            cyber-abuse-guard-v0.16-rc.2.so
