name: RC release v0.15-rc.3 - Linux sandbox validation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated RC tag (must be v0.15-rc.3)
        required: true
        type: string
      expected_tag_object_sha:
        description: Exact 40-character annotated tag object SHA
        required: true
        type: string
      expected_commit:
        description: Exact 40-character main commit at the RC tag
        required: true
        type: string
      expected_tree:
        description: Exact 40-character source tree at the RC tag
        required: true
        type: string
      ci_run_id:
        description: Successful exact-main push CI run for the commit
        required: true
        type: string
      ci_run_attempt:
        description: Exact successful attempt number for the admitted CI run
        required: true
        type: string
      authorize_rc_release:
        description: Publish the Linux-only sandbox RC prerelease
        required: true
        type: boolean
        default: false

permissions:
  actions: read
  contents: read

concurrency:
  group: rc-release-${{ inputs.tag }}
  cancel-in-progress: false

env:
  GO_VERSION: '1.26.4'
  VERSION: '0.15'
  RC_VERSION: '0.15-rc.3'
  CYCLONEDX_GOMOD_VERSION: 'v1.9.0'
  GOVULNCHECK_VERSION: 'v1.6.0'

jobs:
  admission:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Bind RC authorization to annotated exact-main tag before checkout
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          AUTHORIZED: ${{ inputs.authorize_rc_release }}
        run: |
          set -euo pipefail
          [[ "$AUTHORIZED" == true ]]
          [[ "$TAG" == v0.15-rc.3 ]]
          [[ "$EXPECTED_TAG_OBJECT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_REF" == "refs/tags/$TAG" ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$WORKFLOW_REF" == "${GITHUB_REPOSITORY}/.github/workflows/release-rc.yml@refs/tags/$TAG" ]]

          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]

          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]

          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]

          formal_refs="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v0.15")"
          jq -e '[.[] | select(.ref == "refs/tags/v0.15")] | length == 0' \
            <<<"$formal_refs" >/dev/null

          releases="$RUNNER_TEMP/rc-admission-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          release="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length <= 1 then . else error("duplicate RC releases exist") end
          ' "$releases")"
          if [[ "$(jq -r 'length' <<<"$release")" == 1 ]]; then
            jq -e '
              .[0].draft == true and .[0].prerelease == true and
              ([.[0].assets[].name] - [
                "cyber-abuse-guard-v0.15-rc.3.so",
                "cyber-abuse-guard-v0.15-rc.3.so.sha256",
                "cyber-abuse-guard_0.15-rc.3_linux_amd64.zip",
                "cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip",
                "build-metadata.json", "checksums.txt", "ruleset-manifest.json",
                "ruleset.sha256", "sbom.cdx.json",
                "rc-release-test-summary.txt", "rc-release-test-summary.txt.sha256",
                "rc-release-evidence.md", "rc-release-evidence.md.sha256",
                "cyber-abuse-guard-v0.15-rc.3-source.tar.gz",
                "cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256",
                "rc-release-manifest.json", "rc-release-manifest.json.sha256"
              ] | length == 0)
            ' <<<"$release" >/dev/null
          fi

      - name: Bind RC admission to successful exact-main push CI
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
        run: |
          set -euo pipefail
          [[ "$CI_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$CI_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          response="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$CI_RUN_ID" \
            --argjson run_attempt "$CI_RUN_ATTEMPT" '
              .id == $run_id and
              .run_attempt == $run_attempt and
              .name == "CI" and
              .path == ".github/workflows/ci.yml" and
              .event == "push" and
              .head_branch == "main" and
              .head_sha == $commit and
              .status == "completed" and
              .conclusion == "success" and
              .repository.full_name == $repository
            ' <<<"$response" >/dev/null

  build:
    needs: admission
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout exact RC tag with restricted data excluded
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
          filter: blob:none
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            /*
            !/cmd/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/cmd/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/cmd/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/cmd/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/cmd/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/cmd/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/docs/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/docs/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]_[Rr][Ee][Pp][Oo][Rr][Tt].[Mm][Dd]
            !/docs/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/docs/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/docs/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/docs/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/internal/classifier/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/internal/classifier/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/internal/classifier/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/internal/classifier/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/internal/classifier/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/internal/classifier/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*
            !/testdata/**/*[Ee][Vv][Aa][Ll][Uu][Aa][Tt][Ii][Oo][Nn]*
            !/testdata/**/*[Hh][Oo][Ll][Dd][Oo][Uu][Tt]*
            !/testdata/**/*[Cc][Oo][Nn][Ss][Uu][Mm][Ee][Dd]*
            !/testdata/**/*[Pp][Rr][Ii][Vv][Aa][Tt][Ee]*
            !/testdata/**/*[Bb][Ll][Ii][Nn][Dd]*
            !/testdata/**/*[Rr][Ee][Tt][Ii][Rr][Ee][Dd]*

      - name: Recheck restricted-data and workflow contracts
        run: |
          python3 -B scripts/round6_safe_gate_contract_test.py
          python3 -B scripts/round6_safe_gate_contract.py --root .
          ./scripts/release-doc-consistency.sh

      - name: Verify immutable RC source identity and annotated tag
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ -z "$(git status --porcelain)" ]]
          [[ "$(git cat-file -t "refs/tags/$TAG")" == tag ]]
          [[ "$(git rev-parse "$TAG^{tag}")" == "$EXPECTED_TAG_OBJECT" ]]
          [[ "$(git rev-list -n 1 "$TAG")" == "$EXPECTED_COMMIT" ]]
          ! git show-ref --verify --quiet refs/tags/v0.15

      - name: Set up pinned Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install bounded RC build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential binutils curl file jq zip unzip nginx
          mkdir -p "$RUNNER_TEMP/bin"
          GOBIN="$RUNNER_TEMP/bin" go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@${CYCLONEDX_GOMOD_VERSION}
          GOBIN="$RUNNER_TEMP/bin" go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run complete Linux RC verification gates and capture summary
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
          ROUND6_SAFE_SPARSE_BUILD: '1'
          CPA_COMPAT_VERIFY_REMOTE: '1'
        run: |
          set -euo pipefail
          summary="$RUNNER_TEMP/rc-release-test-summary.txt"
          : >"$summary"
          chmod 0600 "$summary"
          {
            printf '%s\n' \
              'CPA Cyber Abuse Guard v0.15-rc.3 internal Linux release gates' \
              "commit=$RELEASE_RC_EXPECTED_COMMIT" \
              "tree=$RELEASE_RC_EXPECTED_TREE" \
              "exact_main_ci_run=$CI_RUN_ID" \
              "exact_main_ci_attempt=$CI_RUN_ATTEMPT" \
              'rc_gate.safe_contract=PASS'
            make round6-format-check round6-git-diff-check round6-module-verify
            make cpa-host-fixture-contract
            make round4-regression round5-regression round6-regression
            make unit-test race round6-vet fuzz-smoke round6-script-test
            make management-proxy-413-test corpus-regression
            make development-public-jailbreak-corpus round6-benchmark round6-vulncheck
            go test ./internal/classifier -run '^TestClassifierPolicyIdentity$' -count=1
            printf '%s\n' 'rc_gate.full_linux_quality=PASS'
            make cpa-latest-compat
            printf '%s\n' 'rc_gate.cpa_v7.2.88_source_compatibility=PASS'
            make ARTIFACT_VERSION=${RC_VERSION} integration-test
            printf '%s\n' 'rc_gate.rc_integration=PASS'
            make clean-tree-check
            printf '%s\n' 'rc_gate.clean_tree=PASS'
          } 2>&1 | tee "$summary"

      - name: Build and reproduce exact RC release assets
        env:
          RELEASE_RC_BUILD: '1'
          RELEASE_RC_TAG: ${{ inputs.tag }}
          RELEASE_RC_EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          RELEASE_RC_EXPECTED_TREE: ${{ inputs.expected_tree }}
          RELEASE_RC_WORKFLOW_SHA: ${{ github.workflow_sha }}
          RC_CI_RUN_ID: ${{ inputs.ci_run_id }}
          RC_CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
          RC_TEST_SUMMARY_INPUT: ${{ runner.temp }}/rc-release-test-summary.txt
          ROUND6_SAFE_SPARSE_BUILD: '1'
          REQUIRE_DIST_ARTIFACTS: '1'
        run: ./scripts/round6-rc-artifacts.sh

      - name: Reverify RC artifact allowlist and hashes
        env:
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            build-metadata.json \
            checksums.txt \
            cyber-abuse-guard-v0.15-rc.3.so \
            cyber-abuse-guard-v0.15-rc.3.so.sha256 \
            cyber-abuse-guard_0.15-rc.3_linux_amd64.zip \
            cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip \
            cyber-abuse-guard-v0.15-rc.3-source.tar.gz \
            cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 \
            rc-release-evidence.md \
            rc-release-evidence.md.sha256 \
            rc-release-manifest.json \
            rc-release-manifest.json.sha256 \
            rc-release-test-summary.txt \
            rc-release-test-summary.txt.sha256 \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json | LC_ALL=C sort)"
          actual="$(find dist -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual" == "$expected" ]]
          while IFS= read -r name; do
            [[ -f "dist/$name" && ! -L "dist/$name" ]]
          done <<<"$expected"
          (cd dist && sha256sum -c checksums.txt && \
            sha256sum -c cyber-abuse-guard-v0.15-rc.3.so.sha256 && \
            sha256sum -c ruleset.sha256 && \
            sha256sum -c rc-release-test-summary.txt.sha256 && \
            sha256sum -c rc-release-evidence.md.sha256 && \
            sha256sum -c cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 && \
            sha256sum -c rc-release-manifest.json.sha256)
          jq -e \
            --arg tag_object "$EXPECTED_TAG_OBJECT" \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            --argjson ci_run_id "$CI_RUN_ID" \
            --argjson ci_run_attempt "$CI_RUN_ATTEMPT" '
              .schema_version == 2 and
              .status == "RC_INTERNAL_GATES_PASS / SANDBOX_ONLY / SERVER_VALIDATION_REQUIRED / NOT_FORMAL / NOT_ROUND6_CANDIDATE" and
              .packaging_profile == "FORMAL_STRUCTURE / RC EVIDENCE ONLY / NO FORMAL ATTESTATION" and
              .source_version == "0.15" and .artifact_version == "0.15-rc.3" and
              .tag == "v0.15-rc.3" and .tag_object == $tag_object and
              .commit == $commit and .tree == $tree and
              .ci_run_id == $ci_run_id and .ci_run_attempt == $ci_run_attempt and
              .cpa.version == "v7.2.88" and
              .cpa.commit == "93d74a890a44802f656d7f39a573916b2611896e" and
              .cpa.source_compatibility == "PASS" and
              .cpa.real_host_validation == "NOT_RUN / SERVER_SANDBOX_REQUIRED" and
              .independent_audit == "NOT_PROVIDED" and
              .independent_evaluation == "NOT_PROVIDED" and
              .artifacts.audit_bundle.name == "cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip" and
              .artifacts.test_summary.name == "rc-release-test-summary.txt" and
              .artifacts.rc_evidence.name == "rc-release-evidence.md" and
              .artifacts.source_archive.name == "cyber-abuse-guard-v0.15-rc.3-source.tar.gz"
            ' dist/rc-release-manifest.json >/dev/null
          assert_manifest_hash() {
            local name="$1" filter="$2" expected actual
            expected="$(jq -er "$filter | select(type == \"string\" and test(\"^[0-9a-f]{64}$\"))" \
              dist/rc-release-manifest.json)"
            actual="$(sha256sum "dist/$name" | awk '{print $1}')"
            [[ "$actual" == "$expected" ]]
          }
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3.so .artifacts.so.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3.so.sha256 .artifacts.so.sidecar_sha256
          assert_manifest_hash cyber-abuse-guard_0.15-rc.3_linux_amd64.zip .artifacts.store_zip.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip .artifacts.audit_bundle.sha256
          assert_manifest_hash build-metadata.json .artifacts.build_metadata_sha256
          assert_manifest_hash checksums.txt .artifacts.checksums_sha256
          assert_manifest_hash ruleset-manifest.json .artifacts.ruleset_manifest_sha256
          assert_manifest_hash ruleset.sha256 .artifacts.ruleset_sha256
          assert_manifest_hash sbom.cdx.json .artifacts.sbom_sha256
          assert_manifest_hash rc-release-test-summary.txt .artifacts.test_summary.sha256
          assert_manifest_hash rc-release-test-summary.txt.sha256 .artifacts.test_summary.sidecar_sha256
          assert_manifest_hash rc-release-evidence.md .artifacts.rc_evidence.sha256
          assert_manifest_hash rc-release-evidence.md.sha256 .artifacts.rc_evidence.sidecar_sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-source.tar.gz .artifacts.source_archive.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 .artifacts.source_archive.sidecar_sha256
          [[ -z "$(git status --porcelain)" ]]

      - name: Upload exact verified RC assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rc-v0.15-rc.3-${{ inputs.expected_commit }}
          path: |
            dist/cyber-abuse-guard-v0.15-rc.3.so
            dist/cyber-abuse-guard-v0.15-rc.3.so.sha256
            dist/cyber-abuse-guard_0.15-rc.3_linux_amd64.zip
            dist/cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/rc-release-test-summary.txt
            dist/rc-release-test-summary.txt.sha256
            dist/rc-release-evidence.md
            dist/rc-release-evidence.md.sha256
            dist/cyber-abuse-guard-v0.15-rc.3-source.tar.gz
            dist/cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256
            dist/rc-release-manifest.json
            dist/rc-release-manifest.json.sha256
          if-no-files-found: error
          retention-days: 30

  publish:
    needs: build
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Download exact verified RC assets
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: rc-v0.15-rc.3-${{ inputs.expected_commit }}
          path: dist

      - name: Reverify transferred RC assets without repository source
        env:
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
          BUILD_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          expected="$(printf '%s\n' \
            build-metadata.json \
            checksums.txt \
            cyber-abuse-guard-v0.15-rc.3.so \
            cyber-abuse-guard-v0.15-rc.3.so.sha256 \
            cyber-abuse-guard_0.15-rc.3_linux_amd64.zip \
            cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip \
            cyber-abuse-guard-v0.15-rc.3-source.tar.gz \
            cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 \
            rc-release-evidence.md \
            rc-release-evidence.md.sha256 \
            rc-release-manifest.json \
            rc-release-manifest.json.sha256 \
            rc-release-test-summary.txt \
            rc-release-test-summary.txt.sha256 \
            ruleset-manifest.json \
            ruleset.sha256 \
            sbom.cdx.json | LC_ALL=C sort)"
          actual="$(find dist -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)"
          [[ "$actual" == "$expected" ]]
          while IFS= read -r name; do
            [[ -f "dist/$name" && ! -L "dist/$name" ]]
          done <<<"$expected"
          (cd dist && sha256sum -c checksums.txt && \
            sha256sum -c cyber-abuse-guard-v0.15-rc.3.so.sha256 && \
            sha256sum -c ruleset.sha256 && \
            sha256sum -c rc-release-test-summary.txt.sha256 && \
            sha256sum -c rc-release-evidence.md.sha256 && \
            sha256sum -c cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 && \
            sha256sum -c rc-release-manifest.json.sha256)
          jq -e \
            --arg tag_object "$EXPECTED_TAG_OBJECT" \
            --arg commit "$EXPECTED_COMMIT" \
            --arg tree "$EXPECTED_TREE" \
            --argjson ci_run_id "$CI_RUN_ID" \
            --argjson ci_run_attempt "$CI_RUN_ATTEMPT" \
            --argjson run_id "$BUILD_RUN_ID" '
              .schema_version == 2 and
              .status == "RC_INTERNAL_GATES_PASS / SANDBOX_ONLY / SERVER_VALIDATION_REQUIRED / NOT_FORMAL / NOT_ROUND6_CANDIDATE" and
              .packaging_profile == "FORMAL_STRUCTURE / RC EVIDENCE ONLY / NO FORMAL ATTESTATION" and
              .artifact_version == "0.15-rc.3" and .tag == "v0.15-rc.3" and
              .tag_object == $tag_object and .commit == $commit and
              .tree == $tree and
              .ci_run_id == $ci_run_id and .ci_run_attempt == $ci_run_attempt and
              .workflow.run_id == $run_id and
              .cpa.version == "v7.2.88" and
              .cpa.source_compatibility == "PASS" and
              .cpa.real_host_validation == "NOT_RUN / SERVER_SANDBOX_REQUIRED" and
              .independent_audit == "NOT_PROVIDED" and
              .independent_evaluation == "NOT_PROVIDED"
            ' dist/rc-release-manifest.json >/dev/null
          assert_manifest_hash() {
            local name="$1" filter="$2" expected actual
            expected="$(jq -er "$filter | select(type == \"string\" and test(\"^[0-9a-f]{64}$\"))" \
              dist/rc-release-manifest.json)"
            actual="$(sha256sum "dist/$name" | awk '{print $1}')"
            [[ "$actual" == "$expected" ]]
          }
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3.so .artifacts.so.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3.so.sha256 .artifacts.so.sidecar_sha256
          assert_manifest_hash cyber-abuse-guard_0.15-rc.3_linux_amd64.zip .artifacts.store_zip.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip .artifacts.audit_bundle.sha256
          assert_manifest_hash build-metadata.json .artifacts.build_metadata_sha256
          assert_manifest_hash checksums.txt .artifacts.checksums_sha256
          assert_manifest_hash ruleset-manifest.json .artifacts.ruleset_manifest_sha256
          assert_manifest_hash ruleset.sha256 .artifacts.ruleset_sha256
          assert_manifest_hash sbom.cdx.json .artifacts.sbom_sha256
          assert_manifest_hash rc-release-test-summary.txt .artifacts.test_summary.sha256
          assert_manifest_hash rc-release-test-summary.txt.sha256 .artifacts.test_summary.sidecar_sha256
          assert_manifest_hash rc-release-evidence.md .artifacts.rc_evidence.sha256
          assert_manifest_hash rc-release-evidence.md.sha256 .artifacts.rc_evidence.sidecar_sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-source.tar.gz .artifacts.source_archive.sha256
          assert_manifest_hash cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256 .artifacts.source_archive.sidecar_sha256

      - name: Recheck immutable tag and main before publication
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        run: |
          set -euo pipefail
          main_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
          tag_ref="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
          [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          commit_object="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]

      - name: Create, byte-check, and publish v0.15-rc.3 prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
          CI_RUN_ATTEMPT: ${{ inputs.ci_run_attempt }}
        run: |
          set -euo pipefail
          assert_remote_identity() {
            local main_ref tag_ref tag_object_sha tag_object commit_object formal_refs ci_response
            main_ref="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
            [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
            [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
            tag_ref="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
            [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
            tag_object_sha="$(jq -er '.object.sha | select(test("^[0-9a-f]{40}$"))' <<<"$tag_ref")"
            [[ "$tag_object_sha" == "$EXPECTED_TAG_OBJECT" ]]
            tag_object="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/git/tags/${tag_object_sha}")"
            [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
            [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
            commit_object="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
            [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]
            formal_refs="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/git/matching-refs/tags/v0.15")"
            jq -e '[.[] | select(.ref == "refs/tags/v0.15")] | length == 0' \
              <<<"$formal_refs" >/dev/null
            ci_response="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/actions/runs/${CI_RUN_ID}")"
            jq -e \
              --arg repository "$GITHUB_REPOSITORY" \
              --arg commit "$EXPECTED_COMMIT" \
              --argjson run_id "$CI_RUN_ID" \
              --argjson run_attempt "$CI_RUN_ATTEMPT" '
                .id == $run_id and
                .run_attempt == $run_attempt and
                .name == "CI" and
                .path == ".github/workflows/ci.yml" and
                .event == "push" and
                .head_branch == "main" and
                .head_sha == $commit and
                .status == "completed" and
                .conclusion == "success" and
                .repository.full_name == $repository
              ' <<<"$ci_response" >/dev/null
          }

          notes="$RUNNER_TEMP/rc-release-notes.md"
          cat >"$notes" <<EOF
          Linux amd64 release candidate for server sandbox validation.

          - Source commit: \`$EXPECTED_COMMIT\`
          - Exact-main CI: https://github.com/${GITHUB_REPOSITORY}/actions/runs/$CI_RUN_ID
            (attempt $CI_RUN_ATTEMPT)
          - CPA compatibility target: v7.2.88 (\`93d74a890a44802f656d7f39a573916b2611896e\`)
          - Store package: \`cyber-abuse-guard_0.15-rc.3_linux_amd64.zip\`
          - Packaging: 17-asset formal structure with audit bundle, source archive,
            SBOM, checksums, internal test summary, RC evidence, and exact manifest
          - Internal Linux gates: passed in this release workflow

          This prerelease is Linux amd64 only. It is not the formal v0.15 release,
          not a Round6 Host/audit/evaluation attestation, and not production approval.
          Real CPA Host validation remains required in the server sandbox.
          EOF
          release_title='v0.15-rc.3 - Linux server sandbox validation required'
          expected_body="$(cat "$notes")"

          assets=(
            dist/cyber-abuse-guard-v0.15-rc.3.so
            dist/cyber-abuse-guard-v0.15-rc.3.so.sha256
            dist/cyber-abuse-guard_0.15-rc.3_linux_amd64.zip
            dist/cyber-abuse-guard-v0.15-rc.3-audit-bundle.zip
            dist/build-metadata.json
            dist/checksums.txt
            dist/ruleset-manifest.json
            dist/ruleset.sha256
            dist/sbom.cdx.json
            dist/rc-release-test-summary.txt
            dist/rc-release-test-summary.txt.sha256
            dist/rc-release-evidence.md
            dist/rc-release-evidence.md.sha256
            dist/cyber-abuse-guard-v0.15-rc.3-source.tar.gz
            dist/cyber-abuse-guard-v0.15-rc.3-source.tar.gz.sha256
            dist/rc-release-manifest.json
            dist/rc-release-manifest.json.sha256
          )
          assert_remote_identity

          releases="$RUNNER_TEMP/rc-draft-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          matches="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length <= 1 then . else error("duplicate RC releases exist") end
          ' "$releases")"
          if [[ "$(jq -r 'length' <<<"$matches")" == 0 ]]; then
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --target "$EXPECTED_COMMIT" \
              --title "$release_title" \
              --notes-file "$notes" \
              --draft \
              --prerelease \
              --latest=false
          fi

          releases="$RUNNER_TEMP/rc-current-releases.json"
          gh api --paginate --slurp \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" >"$releases"
          release="$(jq -ce --arg tag "$TAG" '
            [.[][] | select(.tag_name == $tag)] |
            if length == 1 then .[0] else error("expected exactly one RC release") end
          ' "$releases")"
          release_id="$(jq -er '.id | select(type == "number")' <<<"$release")"
          if [[ "$(jq -r '.draft' <<<"$release")" != true ]]; then
            gh api --method PATCH \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F draft=true \
              -F prerelease=true \
              -f make_latest=false \
              -f name="$release_title" \
              -f body="$expected_body" \
              -f tag_name="$TAG" \
              -f target_commitish="$EXPECTED_COMMIT" >/dev/null
            printf '%s\n' 'RC release was unexpectedly public before byte verification; restored draft and stopped' >&2
            exit 1
          fi
          [[ "$(jq -r '.prerelease' <<<"$release")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$release")" == "$TAG" ]]
          expected_assets="$(printf '%s\n' "${assets[@]#dist/}" | LC_ALL=C sort)"
          existing_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          if [[ -n "$existing_assets" ]]; then
            unexpected_assets="$(comm -23 \
              <(printf '%s\n' "$existing_assets") \
              <(printf '%s\n' "$expected_assets"))"
            [[ -z "$unexpected_assets" ]]
          fi
          gh release upload "$TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
          gh release edit "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$EXPECTED_COMMIT" \
            --title "$release_title" \
            --notes-file "$notes" \
            --draft \
            --prerelease \
            --latest=false

          release="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          [[ "$(jq -r '.draft' <<<"$release")" == true ]]
          [[ "$(jq -r '.prerelease' <<<"$release")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$release")" == "$TAG" ]]
          [[ "$(jq -r '.target_commitish' <<<"$release")" == "$EXPECTED_COMMIT" ]]
          [[ "$(jq -r '.name' <<<"$release")" == "$release_title" ]]
          [[ "$(jq -r '.body' <<<"$release")" == "$expected_body" ]]
          actual_assets="$(jq -r '.assets[].name' <<<"$release" | LC_ALL=C sort)"
          [[ "$actual_assets" == "$expected_assets" ]]

          verify_dir="$(mktemp -d "$RUNNER_TEMP/rc-upload-check.XXXXXX")"
          trap 'rm -rf -- "$verify_dir"' EXIT
          while IFS= read -r name; do
            asset_id="$(jq -er --arg name "$name" '
              [.assets[] | select(.name == $name)] |
              if length == 1 then .[0].id else error("missing or duplicate RC asset") end
            ' <<<"$release")"
            gh api \
              --header 'Accept: application/octet-stream' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}" >"$verify_dir/$name"
            cmp -s "dist/$name" "$verify_dir/$name"
          done <<<"$expected_assets"

          draft_fingerprint="$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$release")"
          assert_remote_identity
          current="$(gh api \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
          if [[ "$(jq -r '.draft' <<<"$current")" != true ]]; then
            gh api --method PATCH \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -F draft=true \
              -F prerelease=true \
              -f make_latest=false \
              -f name="$release_title" \
              -f body="$expected_body" \
              -f tag_name="$TAG" \
              -f target_commitish="$EXPECTED_COMMIT" >/dev/null
            printf '%s\n' 'RC release became public during draft verification; restored draft and stopped' >&2
            exit 1
          fi
          [[ "$(jq -r '.prerelease' <<<"$current")" == true ]]
          [[ "$(jq -r '.tag_name' <<<"$current")" == "$TAG" ]]
          [[ "$(jq -r '.target_commitish' <<<"$current")" == "$EXPECTED_COMMIT" ]]
          [[ "$(jq -r '.name' <<<"$current")" == "$release_title" ]]
          [[ "$(jq -r '.body' <<<"$current")" == "$expected_body" ]]
          [[ "$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$current")" == "$draft_fingerprint" ]]
          publish_response="$(gh api --method PATCH \
            --header 'Accept: application/vnd.github+json' \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -F prerelease=true \
            -f make_latest=false \
            -f name="$release_title" \
            -f body="$expected_body" \
            -f tag_name="$TAG" \
            -f target_commitish="$EXPECTED_COMMIT")"
          published_now=1
          if ! {
            assert_remote_identity
            final="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
            [[ "$(jq -r '.id' <<<"$publish_response")" == "$release_id" ]]
            [[ "$(jq -r '.draft' <<<"$final")" == false ]]
            [[ "$(jq -r '.prerelease' <<<"$final")" == true ]]
            [[ "$(jq -r '.tag_name' <<<"$final")" == "$TAG" ]]
            [[ "$(jq -r '.target_commitish' <<<"$final")" == "$EXPECTED_COMMIT" ]]
            [[ "$(jq -r '.name' <<<"$final")" == "$release_title" ]]
            [[ "$(jq -r '.body' <<<"$final")" == "$expected_body" ]]
            jq -e '.assets | length == 17 and all(.state == "uploaded")' <<<"$final" >/dev/null
            [[ "$(jq -r '.assets[].name' <<<"$final" | LC_ALL=C sort)" == "$expected_assets" ]]
            [[ "$(jq -c '[.assets[] | {id, name, size, digest}] | sort_by(.name)' <<<"$final")" == "$draft_fingerprint" ]]
            latest_tag="$(gh api \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/${GITHUB_REPOSITORY}/releases/latest" \
              --jq '.tag_name' 2>/dev/null || true)"
            [[ "$latest_tag" != "$TAG" ]]
          }; then
            if [[ "$published_now" == 1 ]]; then
              printf '%s\n' 'post-publication validation failed; restoring the RC release to draft' >&2
              gh api --method PATCH \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
                -F draft=true \
                -F prerelease=true \
                -f make_latest=false \
                -f name="$release_title" \
                -f body="$expected_body" \
                -f tag_name="$TAG" \
                -f target_commitish="$EXPECTED_COMMIT" >/dev/null
              rollback="$(gh api \
                --header 'Accept: application/vnd.github+json' \
                --header 'X-GitHub-Api-Version: 2022-11-28' \
                "repos/${GITHUB_REPOSITORY}/releases/${release_id}")"
              [[ "$(jq -r '.draft' <<<"$rollback")" == true ]]
              [[ "$(jq -r '.prerelease' <<<"$rollback")" == true ]]
              [[ "$(jq -r '.tag_name' <<<"$rollback")" == "$TAG" ]]
              [[ "$(jq -r '.name' <<<"$rollback")" == "$release_title" ]]
              [[ "$(jq -r '.body' <<<"$rollback")" == "$expected_body" ]]
            fi
            exit 1
          fi
