name: Round 8 protected CPA Host validation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing annotated RC tag (must be v0.16-rc.2)
        required: true
        type: string
      expected_tag_object_sha:
        description: Exact annotated tag object SHA
        required: true
        type: string
      expected_commit:
        description: Exact main commit at the RC tag
        required: true
        type: string
      expected_tree:
        description: Exact source tree at the RC tag
        required: true
        type: string
      phase1_run_id:
        description: Successful private-candidate release-rc workflow run ID
        required: true
        type: string
      phase1_run_attempt:
        description: Exact successful private-candidate run attempt
        required: true
        type: string
      phase1_artifact_id:
        description: Exact private 17-asset artifact ID
        required: true
        type: string
      phase1_artifact_digest:
        description: Exact sha256 digest reported by GitHub for the private artifact ZIP
        required: true
        type: string
      challenge:
        description: Fresh lowercase 64-hex one-time Host execution challenge
        required: true
        type: string

permissions:
  actions: read
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: round8-host-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  base-image-supply-chain:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      artifact-id: ${{ steps.base_artifact.outputs.artifact-id }}
      artifact-digest: ${{ steps.base_artifact.outputs.artifact-digest }}
    steps:
      - name: Admit exact immutable RC source for base-image staging
        env:
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TAG" == v0.16-rc.2 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "${GITHUB_REF}" == "refs/tags/$TAG" ]]
          [[ "${GITHUB_SHA}" == "$EXPECTED_COMMIT" ]]
          [[ "${GITHUB_WORKFLOW_SHA}" == "$EXPECTED_COMMIT" ]]
          [[ "${GITHUB_WORKFLOW_REF}" == "${GITHUB_REPOSITORY}/.github/workflows/round8-host-validation.yml@refs/tags/$TAG" ]]
          [[ "${RUNNER_ENVIRONMENT}" == github-hosted ]]
          [[ "${RUNNER_OS}" == Linux && "${RUNNER_ARCH}" == X64 ]]

      - name: Pull and package exact Docker Official Image manifests
        env:
          GO_REPOSITORY: docker.io/library/golang
          GO_CANONICAL: docker.io/library/golang:1.26.4-bookworm@sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b
          GO_INDEX_DIGEST: sha256:b305420a68d0f229d91eb3b3ed9e519fcf2cf5461da4bef997bf927e8c0bfd2b
          GO_PLATFORM_DIGEST: sha256:5a94593d87a066df5abb02969be911524963f53908292aa5a1a6096fc019012a
          GO_IMAGE_ID: sha256:9d9d715d688ced62374388302667e31a6d3a0655c4c9e0ceaf1a4c4886752a62
          GO_LOCAL: cag-round8-base:golang-1.26.4-bookworm-amd64-5a94593d87a0
          DEBIAN_REPOSITORY: docker.io/library/debian
          DEBIAN_CANONICAL: docker.io/library/debian:bookworm-20260623@sha256:30482e873082e906a4908c10529180aefb6f77620aea7404b909829fadc5d168
          DEBIAN_INDEX_DIGEST: sha256:30482e873082e906a4908c10529180aefb6f77620aea7404b909829fadc5d168
          DEBIAN_PLATFORM_DIGEST: sha256:129588494497601baa5dbca1df687c835ff166ec4dd3bf307be684f34da07ab5
          DEBIAN_IMAGE_ID: sha256:ee37b64a84a5a803ef11061304de62741b41b1f1b9e2a743b1e7686b12029d79
          DEBIAN_LOCAL: cag-round8-base:debian-bookworm-20260623-amd64-129588494497
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -s)/$(uname -m)" == Linux/x86_64 ]]
          registry_mirrors="$(docker info --format '{{json .RegistryConfig.Mirrors}}')"
          [[ "$registry_mirrors" == '[]' || "$registry_mirrors" == null ]]
          bundle="$RUNNER_TEMP/round8-base-images"
          rm -rf -- "$bundle"
          mkdir -m 0700 -- "$bundle"

          verify_raw_digest() {
            python3 -B - "$1" "$2" <<'PY'
          import hashlib
          import sys

          raw = open(sys.argv[1], "rb").read()
          expected = sys.argv[2]
          candidates = (raw, raw[:-1]) if raw.endswith(b"\n") else (raw,)
          if all("sha256:" + hashlib.sha256(item).hexdigest() != expected for item in candidates):
              raise SystemExit("registry returned bytes outside the requested immutable digest")
          PY
          }

          verify_registry_identity() {
            local repository="$1" canonical="$2" index_digest="$3" platform_digest="$4" image_id="$5" prefix="$6"
            local index_json="$bundle/${prefix}-index.json" platform_json="$bundle/${prefix}-platform.json"
            docker buildx imagetools inspect --raw "$canonical" >"$index_json"
            verify_raw_digest "$index_json" "$index_digest"
            jq -e --arg digest "$platform_digest" '
              [.manifests[] | select(
                .digest == $digest and .platform.os == "linux" and
                .platform.architecture == "amd64" and
                (.platform.variant // "") == ""
              )] | length == 1
            ' "$index_json" >/dev/null
            docker buildx imagetools inspect --raw "$repository@$platform_digest" >"$platform_json"
            verify_raw_digest "$platform_json" "$platform_digest"
            jq -e --arg image_id "$image_id" '.config.digest == $image_id' \
              "$platform_json" >/dev/null
          }

          verify_registry_identity "$GO_REPOSITORY" "$GO_CANONICAL" \
            "$GO_INDEX_DIGEST" "$GO_PLATFORM_DIGEST" "$GO_IMAGE_ID" golang
          verify_registry_identity "$DEBIAN_REPOSITORY" "$DEBIAN_CANONICAL" \
            "$DEBIAN_INDEX_DIGEST" "$DEBIAN_PLATFORM_DIGEST" "$DEBIAN_IMAGE_ID" debian

          docker pull --quiet --platform linux/amd64 "$GO_CANONICAL" >/dev/null
          docker pull --quiet --platform linux/amd64 "$DEBIAN_CANONICAL" >/dev/null
          [[ "$(docker image inspect --format '{{.Os}}/{{.Architecture}} {{.Id}}' "$GO_CANONICAL")" == "linux/amd64 $GO_IMAGE_ID" ]]
          [[ "$(docker image inspect --format '{{.Os}}/{{.Architecture}} {{.Id}}' "$DEBIAN_CANONICAL")" == "linux/amd64 $DEBIAN_IMAGE_ID" ]]
          docker tag "$GO_CANONICAL" "$GO_LOCAL"
          docker tag "$DEBIAN_CANONICAL" "$DEBIAN_LOCAL"
          [[ "$(docker image inspect --format '{{.Id}}' "$GO_LOCAL")" == "$GO_IMAGE_ID" ]]
          [[ "$(docker image inspect --format '{{.Id}}' "$DEBIAN_LOCAL")" == "$DEBIAN_IMAGE_ID" ]]

          archive="$bundle/round8-base-images-linux-amd64.tar.gz"
          docker save "$GO_LOCAL" "$DEBIAN_LOCAL" | gzip -n -6 >"$archive"
          archive_size="$(stat -c %s "$archive")"
          [[ "$archive_size" -ge 1048576 && "$archive_size" -le 536870912 ]]
          archive_sha="$(sha256sum "$archive" | awk '{print $1}')"
          [[ "$archive_sha" =~ ^[0-9a-f]{64}$ ]]
          printf '%s  %s\n' "$archive_sha" "${archive##*/}" \
            >"$bundle/round8-base-images-linux-amd64.tar.gz.sha256"
          export archive_size archive_sha
          python3 -B - "$bundle/round8-base-images.json" <<'PY'
          import json
          import os
          import sys

          document = {
              "schema_version": 1,
              "platform": "linux/amd64",
              "acquisition": {
                  "registry": "registry-1.docker.io",
                  "mode": "direct-canonical-digest-pull",
                  "relay": "github-attested-digest-bundle/v1",
              },
              "archive": {
                  "name": "round8-base-images-linux-amd64.tar.gz",
                  "sha256": os.environ["archive_sha"],
                  "size": int(os.environ["archive_size"]),
              },
              "images": {
                  "golang": {
                      "upstream_from": "golang:1.26-bookworm",
                      "canonical_reference": os.environ["GO_CANONICAL"],
                      "index_digest": os.environ["GO_INDEX_DIGEST"],
                      "platform_digest": os.environ["GO_PLATFORM_DIGEST"],
                      "image_id": os.environ["GO_IMAGE_ID"],
                      "local_tag": os.environ["GO_LOCAL"],
                  },
                  "debian": {
                      "upstream_from": "debian:bookworm",
                      "canonical_reference": os.environ["DEBIAN_CANONICAL"],
                      "index_digest": os.environ["DEBIAN_INDEX_DIGEST"],
                      "platform_digest": os.environ["DEBIAN_PLATFORM_DIGEST"],
                      "image_id": os.environ["DEBIAN_IMAGE_ID"],
                      "local_tag": os.environ["DEBIAN_LOCAL"],
                  },
              },
          }
          with open(sys.argv[1], "xb") as output:
              output.write(json.dumps(
                  document, ensure_ascii=False, sort_keys=True,
                  separators=(",", ":"), allow_nan=False,
              ).encode("utf-8"))
          PY
          rm -f -- "$bundle/golang-index.json" "$bundle/golang-platform.json" \
            "$bundle/debian-index.json" "$bundle/debian-platform.json"
          [[ "$(find "$bundle" -mindepth 1 -maxdepth 1 -type f | wc -l)" == 3 ]]

      - name: Attest exact immutable base-image bundle
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ runner.temp }}/round8-base-images/round8-base-images-linux-amd64.tar.gz
            ${{ runner.temp }}/round8-base-images/round8-base-images-linux-amd64.tar.gz.sha256
            ${{ runner.temp }}/round8-base-images/round8-base-images.json

      - name: Upload exact immutable base-image bundle
        id: base_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: round8-base-images-${{ inputs.expected_commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/round8-base-images/round8-base-images-linux-amd64.tar.gz
            ${{ runner.temp }}/round8-base-images/round8-base-images-linux-amd64.tar.gz.sha256
            ${{ runner.temp }}/round8-base-images/round8-base-images.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  host-validation:
    needs: base-image-supply-chain
    environment:
      name: round8-host-validation
    runs-on:
      - self-hosted
      - linux
      - x64
      - cag-round8-sandbox
    timeout-minutes: 180
    steps:
      - name: Admit exact tag, Phase 1 run, and private artifact
        id: admission
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_TAG_OBJECT: ${{ inputs.expected_tag_object_sha }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          PHASE1_RUN_ID: ${{ inputs.phase1_run_id }}
          PHASE1_RUN_ATTEMPT: ${{ inputs.phase1_run_attempt }}
          PHASE1_ARTIFACT_ID: ${{ inputs.phase1_artifact_id }}
          PHASE1_ARTIFACT_DIGEST: ${{ inputs.phase1_artifact_digest }}
          HOST_CHALLENGE: ${{ inputs.challenge }}
          SANDBOX_ID: ${{ vars.ROUND8_SANDBOX_ID }}
          DAEMON_ID: ${{ vars.ROUND8_DAEMON_ID }}
          PROBE_IMAGE_ID: ${{ vars.ROUND8_PROBE_IMAGE_ID }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$TAG" == v0.16-rc.2 ]]
          [[ "$EXPECTED_TAG_OBJECT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$EXPECTED_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$PHASE1_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PHASE1_RUN_ATTEMPT" =~ ^[1-9][0-9]*$ ]]
          [[ "$PHASE1_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PHASE1_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$HOST_CHALLENGE" =~ ^[0-9a-f]{64}$ ]]
          [[ "$SANDBOX_ID" =~ ^[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}$ ]]
          [[ "$DAEMON_ID" =~ ^[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}$ ]]
          [[ "$PROBE_IMAGE_ID" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${GITHUB_REF}" == "refs/tags/$TAG" ]]
          [[ "${GITHUB_SHA}" == "$EXPECTED_COMMIT" ]]
          [[ "${GITHUB_WORKFLOW_SHA}" == "$EXPECTED_COMMIT" ]]
          [[ "${GITHUB_WORKFLOW_REF}" == "${GITHUB_REPOSITORY}/.github/workflows/round8-host-validation.yml@refs/tags/$TAG" ]]
          [[ "${RUNNER_ENVIRONMENT}" == self-hosted ]]
          [[ "${RUNNER_OS}" == Linux && "${RUNNER_ARCH}" == X64 ]]

          main_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main")"
          [[ "$(jq -r '.object.type' <<<"$main_ref")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$main_ref")" == "$EXPECTED_COMMIT" ]]
          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          [[ "$(jq -r '.object.type' <<<"$tag_ref")" == tag ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_ref")" == "$EXPECTED_TAG_OBJECT" ]]
          tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${EXPECTED_TAG_OBJECT}")"
          [[ "$(jq -r '.object.type' <<<"$tag_object")" == commit ]]
          [[ "$(jq -r '.object.sha' <<<"$tag_object")" == "$EXPECTED_COMMIT" ]]
          commit_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/commits/${EXPECTED_COMMIT}")"
          [[ "$(jq -r '.tree.sha' <<<"$commit_object")" == "$EXPECTED_TREE" ]]

          phase1="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${PHASE1_RUN_ID}")"
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commit "$EXPECTED_COMMIT" \
            --argjson run_id "$PHASE1_RUN_ID" \
            --argjson run_attempt "$PHASE1_RUN_ATTEMPT" '
              .id == $run_id and .run_attempt == $run_attempt and
              .name == "RC release v0.16-rc.2 - Linux sandbox validation" and
              .path == ".github/workflows/release-rc.yml" and
              .event == "workflow_dispatch" and .head_sha == $commit and
              .status == "completed" and .conclusion == "success" and
              .repository.full_name == $repository
            ' <<<"$phase1" >/dev/null
          artifacts="$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${PHASE1_RUN_ID}/artifacts?per_page=100")"
          artifact="$(jq -ce \
            --arg name "rc-v0.16-rc.2-${EXPECTED_COMMIT}" \
            --arg digest "$PHASE1_ARTIFACT_DIGEST" \
            --argjson artifact_id "$PHASE1_ARTIFACT_ID" '
              [.artifacts[] | select(.id == $artifact_id)] |
              if length == 1 then .[0] else error("expected one Phase 1 artifact ID") end |
              select(
                .name == $name and .digest == $digest and .expired == false and
                (.size_in_bytes | type == "number" and . > 0 and . <= 268435456)
              )
            ' <<<"$artifacts")"
          [[ "$(jq -r '.workflow_run.id' <<<"$artifact")" == "$PHASE1_RUN_ID" ]]
          printf 'artifact_name=%s\n' "$(jq -r '.name' <<<"$artifact")" >>"$GITHUB_OUTPUT"

      - name: Checkout exact tagged source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download, byte-bind, and verify the private Phase 1 candidate
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          PHASE1_ARTIFACT_ID: ${{ inputs.phase1_artifact_id }}
          PHASE1_ARTIFACT_DIGEST: ${{ inputs.phase1_artifact_digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(git rev-parse HEAD)" == "$EXPECTED_COMMIT" ]]
          [[ "$(git rev-parse 'HEAD^{tree}')" == "$EXPECTED_TREE" ]]
          [[ -z "$(git status --porcelain)" ]]
          archive="$RUNNER_TEMP/phase1-artifact.zip"
          artifacts="$RUNNER_TEMP/phase1-assets"
          rm -rf -- "$archive" "$artifacts"
          mkdir -m 0700 -- "$artifacts"
          gh api --header 'Accept: application/octet-stream' \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${PHASE1_ARTIFACT_ID}/zip" >"$archive"
          [[ "$(stat -c %s "$archive")" -le 268435456 ]]
          [[ "sha256:$(sha256sum "$archive" | awk '{print $1}')" == "$PHASE1_ARTIFACT_DIGEST" ]]
          python3 -B - "$archive" <<'PY'
          import sys, zipfile
          from pathlib import PurePosixPath

          expected = {
              "build-metadata.json", "checksums.txt",
              "cyber-abuse-guard-v0.16-rc.2.so",
              "cyber-abuse-guard-v0.16-rc.2.so.sha256",
              "cyber-abuse-guard_0.16-rc.2_linux_amd64.zip",
              "cyber-abuse-guard-v0.16-rc.2-audit-bundle.zip",
              "cyber-abuse-guard-v0.16-rc.2-source.tar.gz",
              "cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256",
              "rc-release-evidence.md", "rc-release-evidence.md.sha256",
              "rc-release-manifest.json", "rc-release-manifest.json.sha256",
              "rc-release-test-summary.txt", "rc-release-test-summary.txt.sha256",
              "ruleset-manifest.json", "ruleset.sha256", "sbom.cdx.json",
          }
          with zipfile.ZipFile(sys.argv[1]) as archive:
              names = archive.namelist()
              if len(names) != len(set(names)) or set(names) != expected:
                  raise SystemExit("Phase 1 artifact ZIP entries are not the exact 17 assets")
              if sum(info.file_size for info in archive.infolist()) > 1073741824:
                  raise SystemExit("Phase 1 artifact ZIP expands beyond the reviewed size bound")
              for info in archive.infolist():
                  path = PurePosixPath(info.filename)
                  if path.is_absolute() or ".." in path.parts or len(path.parts) != 1 or info.is_dir():
                      raise SystemExit("unsafe Phase 1 artifact ZIP entry")
                  if info.file_size > 536870912:
                      raise SystemExit("Phase 1 artifact ZIP entry exceeds the reviewed size bound")
          PY
          unzip -q "$archive" -d "$artifacts"
          while IFS= read -r name; do
            [[ -f "$artifacts/$name" && ! -L "$artifacts/$name" ]]
            gh attestation verify "$artifacts/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release-rc.yml" \
              --signer-digest "$EXPECTED_COMMIT" \
              --source-ref "refs/tags/$TAG" \
              --source-digest "$EXPECTED_COMMIT" >/dev/null
          done < <(find "$artifacts" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)
          (cd "$artifacts" && sha256sum -c checksums.txt && \
            sha256sum -c cyber-abuse-guard-v0.16-rc.2.so.sha256 && \
            sha256sum -c ruleset.sha256 && \
            sha256sum -c rc-release-test-summary.txt.sha256 && \
            sha256sum -c rc-release-evidence.md.sha256 && \
            sha256sum -c cyber-abuse-guard-v0.16-rc.2-source.tar.gz.sha256 && \
            sha256sum -c rc-release-manifest.json.sha256)

      - name: Download, attest, and admit immutable base-image bundle
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          BASE_ARTIFACT_ID: ${{ needs.base-image-supply-chain.outputs.artifact-id }}
          BASE_ARTIFACT_DIGEST: ${{ needs.base-image-supply-chain.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$BASE_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$BASE_ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          metadata="$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${BASE_ARTIFACT_ID}")"
          jq -e \
            --arg name "round8-base-images-${EXPECTED_COMMIT}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --arg digest "$BASE_ARTIFACT_DIGEST" \
            --argjson artifact_id "$BASE_ARTIFACT_ID" \
            --argjson run_id "$GITHUB_RUN_ID" '
              .id == $artifact_id and .name == $name and .digest == $digest and
              .expired == false and .workflow_run.id == $run_id and
              (.size_in_bytes | type == "number" and . > 0 and . <= 629145600)
            ' <<<"$metadata" >/dev/null

          zip="$RUNNER_TEMP/round8-base-images.zip"
          bundle="$RUNNER_TEMP/round8-base-images"
          rm -rf -- "$zip" "$bundle"
          mkdir -m 0700 -- "$bundle"
          gh api --header 'Accept: application/octet-stream' \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts/${BASE_ARTIFACT_ID}/zip" >"$zip"
          [[ "$(stat -c %s "$zip")" -le 629145600 ]]
          [[ "sha256:$(sha256sum "$zip" | awk '{print $1}')" == "$BASE_ARTIFACT_DIGEST" ]]
          python3 -B - "$zip" <<'PY'
          import sys
          import zipfile
          from pathlib import PurePosixPath

          expected = {
              "round8-base-images-linux-amd64.tar.gz",
              "round8-base-images-linux-amd64.tar.gz.sha256",
              "round8-base-images.json",
          }
          with zipfile.ZipFile(sys.argv[1]) as archive:
              names = archive.namelist()
              if len(names) != len(set(names)) or set(names) != expected:
                  raise SystemExit("base-image artifact ZIP entries are not exact")
              if sum(item.file_size for item in archive.infolist()) > 629145600:
                  raise SystemExit("base-image artifact ZIP expands beyond the reviewed bound")
              for item in archive.infolist():
                  path = PurePosixPath(item.filename)
                  if path.is_absolute() or ".." in path.parts or len(path.parts) != 1 or item.is_dir():
                      raise SystemExit("unsafe base-image artifact ZIP entry")
                  if item.file_size <= 0 or item.file_size > 536870912:
                      raise SystemExit("base-image artifact ZIP entry size is invalid")
          PY
          unzip -q "$zip" -d "$bundle"
          while IFS= read -r name; do
            [[ -f "$bundle/$name" && ! -L "$bundle/$name" ]]
            gh attestation verify "$bundle/$name" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/round8-host-validation.yml" \
              --signer-digest "$EXPECTED_COMMIT" \
              --source-ref "refs/tags/$TAG" \
              --source-digest "$EXPECTED_COMMIT" >/dev/null
          done < <(find "$bundle" -mindepth 1 -maxdepth 1 -printf '%f\n' | LC_ALL=C sort)
          (cd "$bundle" && sha256sum -c round8-base-images-linux-amd64.tar.gz.sha256)
          ./scripts/round8-host-evidence.sh validate-base-bundle \
            --manifest "$bundle/round8-base-images.json" \
            --archive "$bundle/round8-base-images-linux-amd64.tar.gz"

      - name: Build bounded private CPA and counted-Mock images after sandbox proof
        id: images
        env:
          SANDBOX_ID: ${{ vars.ROUND8_SANDBOX_ID }}
          DAEMON_ID: ${{ vars.ROUND8_DAEMON_ID }}
          PROBE_IMAGE_ID: ${{ vars.ROUND8_PROBE_IMAGE_ID }}
          HOST_CHALLENGE: ${{ inputs.challenge }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
        shell: bash
        run: |
          set -euo pipefail
          image_output="$RUNNER_TEMP/round8-images.txt"
          ./scripts/round8-build-host-images.sh --execute \
            --work "$RUNNER_TEMP" \
            --candidate-commit "$EXPECTED_COMMIT" \
            --candidate-tree "$EXPECTED_TREE" \
            --sandbox-id "$SANDBOX_ID" \
            --daemon-id "$DAEMON_ID" \
            --probe-image-id "$PROBE_IMAGE_ID" \
            --challenge "$HOST_CHALLENGE" \
            --base-images-archive "$RUNNER_TEMP/round8-base-images/round8-base-images-linux-amd64.tar.gz" \
            --base-images-manifest "$RUNNER_TEMP/round8-base-images/round8-base-images.json" >"$image_output"
          [[ "$(wc -l <"$image_output")" == 2 ]]
          primary="$(sed -n 's/^PRIMARY_IMAGE=//p' "$image_output")"
          mock="$(sed -n 's/^MOCK_IMAGE=//p' "$image_output")"
          [[ "$primary" =~ ^cag-round8-cpa:v7\.2\.95-[A-Za-z0-9:_.-]+$ ]]
          [[ "$mock" =~ ^cag-round8-counted-mock:v1-[A-Za-z0-9:_.-]+$ ]]
          printf 'primary=%s\nmock=%s\n' "$primary" "$mock" >>"$GITHUB_OUTPUT"

      - name: Execute the isolated CPA v7.2.95 counted-Mock Host lane
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_TREE: ${{ inputs.expected_tree }}
          SANDBOX_ID: ${{ vars.ROUND8_SANDBOX_ID }}
          DAEMON_ID: ${{ vars.ROUND8_DAEMON_ID }}
          PROBE_IMAGE_ID: ${{ vars.ROUND8_PROBE_IMAGE_ID }}
          HOST_CHALLENGE: ${{ inputs.challenge }}
          PHASE1_RUN_ID: ${{ inputs.phase1_run_id }}
          PHASE1_RUN_ATTEMPT: ${{ inputs.phase1_run_attempt }}
          PHASE1_ARTIFACT_ID: ${{ inputs.phase1_artifact_id }}
          PHASE1_ARTIFACT_DIGEST: ${{ inputs.phase1_artifact_digest }}
          PRIMARY_IMAGE: ${{ steps.images.outputs.primary }}
          MOCK_IMAGE: ${{ steps.images.outputs.mock }}
        shell: bash
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/round8-host-output"
          mkdir -m 0700 -- "$output"
          ./scripts/round8-host-evidence.sh run --execute \
            --artifacts "$RUNNER_TEMP/phase1-assets" \
            --work "$RUNNER_TEMP" \
            --output "$output" \
            --primary-image "$PRIMARY_IMAGE" \
            --mock-image "$MOCK_IMAGE" \
            --commit "$EXPECTED_COMMIT" \
            --tree "$EXPECTED_TREE" \
            --sandbox-id "$SANDBOX_ID" \
            --daemon-id "$DAEMON_ID" \
            --probe-image-id "$PROBE_IMAGE_ID" \
            --challenge "$HOST_CHALLENGE" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --workflow-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --phase1-run-id "$PHASE1_RUN_ID" \
            --phase1-run-attempt "$PHASE1_RUN_ATTEMPT" \
            --phase1-artifact-id "$PHASE1_ARTIFACT_ID" \
            --phase1-artifact-digest "$PHASE1_ARTIFACT_DIGEST" \
            --runner-name "$RUNNER_NAME"
          rm -f -- "$output/round8-host-evidence.json.b64"
          ./scripts/round8-host-evidence.sh validate \
            --artifacts "$RUNNER_TEMP/phase1-assets" \
            --evidence "$output/round8-host-evidence.json" \
            --commit "$EXPECTED_COMMIT" \
            --tree "$EXPECTED_TREE"
          jq -e \
            --arg challenge "$HOST_CHALLENGE" \
            --arg commit "$EXPECTED_COMMIT" \
            --arg sandbox "$SANDBOX_ID" \
            --arg daemon "$DAEMON_ID" \
            --arg probe "$PROBE_IMAGE_ID" \
            --arg runner "$RUNNER_NAME" \
            --argjson run_id "$GITHUB_RUN_ID" \
            --argjson run_attempt "$GITHUB_RUN_ATTEMPT" \
            --argjson phase1_run_id "$PHASE1_RUN_ID" \
            --argjson phase1_run_attempt "$PHASE1_RUN_ATTEMPT" \
            --argjson phase1_artifact_id "$PHASE1_ARTIFACT_ID" \
            --arg phase1_artifact_digest "$PHASE1_ARTIFACT_DIGEST" '
              .schema_version == 2 and
              .execution.trust == "GITHUB_ATTESTED_ROUND8_HOST_WORKFLOW" and
              .execution.challenge == $challenge and
              .execution.workflow == {
                repository: "yujianwudi/cyber-abuse-guard",
                path: ".github/workflows/round8-host-validation.yml",
                ref: "refs/tags/v0.16-rc.2",
                sha: $commit,
                run_id: $run_id,
                run_attempt: $run_attempt
              } and
              .execution.phase1 == {
                workflow_path: ".github/workflows/release-rc.yml",
                run_id: $phase1_run_id,
                run_attempt: $phase1_run_attempt,
                artifact_id: $phase1_artifact_id,
                artifact_digest: $phase1_artifact_digest
              } and
              .execution.runner == {name: $runner, environment: "self-hosted", os: "Linux", arch: "X64"} and
              .execution.sandbox.sandbox_id == $sandbox and
              .execution.sandbox.daemon_id == $daemon and
              .execution.sandbox.probe_image_id == $probe and
              .execution.sandbox.locality_challenge == "PASS" and
              (.cpa | keys) == ["primary"] and
              .cpa.primary.version == "v7.2.95" and
              .cpa.primary.commit == "f71ec0eb6776854457892452cf28c47f0d658251" and
              .cpa.primary.counted_mock_validation == "PASS" and
              .safety.production_accessed == false and
              .safety.real_provider_contacted == false
            ' "$output/round8-host-evidence.json" >/dev/null

      - name: Attest exact Host evidence from this protected workflow
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            ${{ runner.temp }}/round8-host-output/round8-host-evidence.json
            ${{ runner.temp }}/round8-host-output/round8-host-evidence.json.sha256

      - name: Upload exact attested Host evidence
        id: host_artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: round8-host-evidence-${{ inputs.expected_commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/round8-host-output/round8-host-evidence.json
            ${{ runner.temp }}/round8-host-output/round8-host-evidence.json.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Record immutable Host admission values
        env:
          ARTIFACT_ID: ${{ steps.host_artifact.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.host_artifact.outputs.artifact-digest }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$ARTIFACT_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          printf '%s\n' \
            "Host run ID: $GITHUB_RUN_ID" \
            "Host run attempt: $GITHUB_RUN_ATTEMPT" \
            "Host artifact ID: $ARTIFACT_ID" \
            "Host artifact digest: $ARTIFACT_DIGEST" \
            "Host challenge: ${{ inputs.challenge }}" >>"$GITHUB_STEP_SUMMARY"

      - name: Remove private Host images
        if: ${{ always() }}
        env:
          PRIMARY_IMAGE: ${{ steps.images.outputs.primary }}
          MOCK_IMAGE: ${{ steps.images.outputs.mock }}
          GO_BASE_IMAGE: cag-round8-base:golang-1.26.4-bookworm-amd64-5a94593d87a0
          DEBIAN_BASE_IMAGE: cag-round8-base:debian-bookworm-20260623-amd64-129588494497
        shell: bash
        run: |
          set -euo pipefail
          for image in "$PRIMARY_IMAGE" "$MOCK_IMAGE" \
            "$GO_BASE_IMAGE" "$DEBIAN_BASE_IMAGE"; do
            [[ -z "$image" ]] && continue
            [[ "$image" =~ ^cag-round8-[A-Za-z0-9:_.-]+$ ]]
            docker image rm --force "$image" >/dev/null
          done
