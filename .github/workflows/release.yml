name: Release

on:
  push:
    tags:
      # v0.1.1 is compiled into the native metadata. Widen this only after the
      # source version and asset names become tag-derived.
      - 'v0.1.1'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.0'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y build-essential file zip unzip
      - run: make release verify-release
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          draft: true
          files: |
            dist/cyber-abuse-guard-v0.1.1.so
            dist/cyber-abuse-guard-v0.1.1.so.sha256
            dist/cyber-abuse-guard_0.1.1_linux_amd64.zip
            dist/checksums.txt
