name: Release

on:
  push:
    tags:
      # v0.1.0 is compiled into the native metadata. Widen this only after the
      # source version and asset names become tag-derived.
      - 'v0.1.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26.0'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y build-essential file zip unzip
      - run: make test vet race integration-test release verify-release
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          files: |
            dist/cyber-abuse-guard-v0.1.0.so
            dist/cyber-abuse-guard-v0.1.0.so.sha256
            dist/cyber-abuse-guard_0.1.0_linux_amd64.zip
            dist/checksums.txt
