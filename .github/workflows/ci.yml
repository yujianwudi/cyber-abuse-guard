name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.0'
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y build-essential file zip unzip
      - run: make test vet race fuzz-smoke benchmark
      - run: make integration-test
      - run: make release verify-release
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cyber-abuse-guard-linux-amd64
          path: |
            dist/cyber-abuse-guard-v0.1.1.so
            dist/cyber-abuse-guard-v0.1.1.so.sha256
            dist/cyber-abuse-guard_0.1.1_linux_amd64.zip
            dist/checksums.txt
          if-no-files-found: error

  fuzz-long:
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.0'
      - run: |
          go test ./internal/extract -run='^$' -fuzz=FuzzExtractText -fuzztime=30s
          go test ./internal/classifier -run='^$' -fuzz=FuzzClassifier -fuzztime=30s
          go test ./internal/config -run='^$' -fuzz=FuzzConfigParser -fuzztime=30s
