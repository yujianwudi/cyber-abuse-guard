version: "1.0.0"
rules:
  - id: DISRUPT-001
    category: service_disruption
    severity: critical
    base_score: 62
    hard_floor: 80
    authorization_protected: false
    intent:
      zh: ["淹没", "洪泛", "压垮", "资源耗尽", "使其离线", "发动", "攻击"]
      en: ["flood", "floods", "flooding", "flooded", "overload", "overloads", "overloading", "overloaded", "exhaust", "exhausts", "exhausting", "exhausted", "knock", "knocks", "knocking", "knocked", "knock offline", "launch", "launches", "launching", "launched", "attack", "attacks", "attacking", "attacked", "hammer", "hammers", "hammering", "saturate", "saturates", "saturating"]
    object:
      zh: ["ddos", "僵尸网络", "生产服务", "目标网站", "在线业务", "带宽", "目标端口", "真实 ip", "流量放大器"]
      en: ["ddos", "distributed denial-of-service", "botnet", "victim service", "production service", "production sites", "bandwidth", "real api", "live api", "company website", "company's website"]
    operational:
      zh: ["可运行", "完整软件", "工具", "控制器"]
      en: ["working", "complete software", "tool", "controller", "deployable", "operational"]
    target:
      zh: ["真实生产", "指定公司", "生产系统"]
      en: ["victim", "production", "real service", "target"]
    evasion:
      zh: ["放大攻击", "持续攻击"]
      en: ["amplification", "sustained"]
    scale:
      zh: ["高并发", "批量控制", "几千台", "同时", "分布式", "自动化"]
      en: ["high-concurrency", "distributed", "automated traffic", "at scale", "hundreds", "thousands"]
  - id: DISRUPT-002
    category: service_disruption
    severity: critical
    base_score: 62
    hard_floor: 80
    authorization_protected: false
    intent:
      zh: ["删除", "擦除", "破坏", "删库", "擦盘"]
      en: ["delete", "deleted", "wipe", "wiped", "destroy", "destroyed", "destructive deletion", "erase", "erased"]
    object:
      zh: ["生产数据库", "服务器磁盘", "多台主机"]
      en: ["production database", "victim disks", "victim hosts"]
    operational:
      zh: ["脚本", "工具", "远程", "可运行"]
      en: ["script", "tool", "remotely", "working", "operational"]
    target:
      zh: ["生产", "受害者", "真实主机"]
      en: ["production", "victim", "real hosts"]
    evasion:
      zh: ["删除备份", "擦除痕迹"]
      en: ["delete backups", "erase traces"]
    scale:
      zh: ["批量", "多台", "自动"]
      en: ["hundreds", "across", "automate", "multiple"]
  - id: DISRUPT-003
    category: service_disruption
    severity: high
    base_score: 45
    hard_floor: 0
    authorization_protected: false
    intent:
      zh: ["打垮", "使其下线", "拖垮"]
      en: ["take", "take down", "bring down", "knock down"]
    object:
      zh: ["竞争对手网站", "第三方网站"]
      en: ["competitor's website", "third-party website"]
    operational:
      zh: ["流量风暴", "请求风暴"]
      en: ["traffic storm", "request storm"]
    target:
      zh: ["竞争对手", "第三方"]
      en: ["competitor", "third-party"]
    evasion:
      zh: ["绕过限流", "隐藏来源"]
      en: ["bypass rate limits", "hide the source"]
    scale:
      zh: ["分布式", "批量", "大规模"]
      en: ["distributed", "bulk", "at scale"]
