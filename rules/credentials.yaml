version: "1.0.1"
rules:
  - id: CRED-001
    category: credential_theft
    severity: critical
    base_score: 65
    hard_floor: 80
    authorization_protected: true
    intent:
      zh: ["窃取", "盗取", "密码抓取", "凭证转储", "接管", "劫持"]
      en: ["steal", "steals", "stealing", "stole", "stolen", "automate theft", "dump", "dumps", "dumping", "dumped", "hijack", "hijacks", "hijacking", "hijacked"]
    object:
      zh: ["浏览器 cookie", "cookie", "登录 token", "session token", "会话 token", "员工的 session", "保存的密码", "登录凭证", "凭证数据库", "账号密码", "api key", "oauth token", "lsass", "sam 数据库"]
      en: ["browser cookie", "browser cookies", "authentication cookies", "victim cookies", "saved passwords", "login credentials", "browser database", "session token", "active sessions", "account tokens", "access tokens", "api keys", "oauth tokens", "passwords", "credentials", "lsass", "sam database"]
    operational:
      zh: ["可直接运行", "完整代码", "脚本", "完整程序", "可部署", "工具", "静默提取", "自动读取"]
      en: ["write code", "working code", "ready-to-run", "ready to run", "complete code", "script", "working tool", "working software", "deployable"]
    target:
      zh: ["受害者", "受害主机", "真实用户", "真实账号", "员工", "真实电脑"]
      en: ["victim", "real user", "real account", "employee", "compromised user", "victim profile"]
    evasion:
      zh: ["静默", "隐藏运行", "避免告警"]
      en: ["silently", "stealth", "avoid alerts", "undetected"]
    scale:
      zh: ["批量", "自动", "几百个", "多台"]
      en: ["automate", "automated", "multiple", "hundreds", "at scale"]
  - id: CRED-002
    category: credential_theft
    severity: critical
    base_score: 45
    hard_floor: 0
    authorization_protected: true
    intent:
      zh: ["提取", "读取", "收集", "抓取"]
      en: ["build a credential stealer", "build a working credential stealer", "make a credential stealer", "extract", "extracts", "extracting", "capture", "captures", "capturing", "collect", "collects", "collecting", "harvest", "harvests", "harvesting", "grab", "grabs", "grabbing", "pull", "pulls", "pulling"]
    object:
      zh: ["浏览器 cookie", "cookie", "登录 token", "api key", "oauth token", "访问令牌", "密码", "lsass", "sam 数据库", "用户凭证"]
      en: ["browser cookie", "browser cookies", "chrome session cookies", "firefox login secrets", "api keys", "oauth tokens", "passwords", "credentials", "access tokens", "lsass", "sam database"]
    operational:
      zh: ["完整代码", "完整工具", "可运行", "程序", "脚本", "自动化工具", "制作一个", "自动读取"]
      en: ["complete source", "complete code", "working", "software", "automated tool", "build a", "create a"]
    target:
      zh: ["受害者", "受害主机", "真实账户", "员工账号", "用户电脑", "他人账号"]
      en: ["victim host", "victim browser", "real accounts", "employee accounts", "user workstation", "compromised profiles", "other people's profiles", "someone else's browser"]
    evasion:
      zh: ["静默", "隐藏"]
      en: ["silently", "hidden", "undetected"]
    scale:
      zh: ["批量", "自动", "自动化", "多个"]
      en: ["bulk", "automated", "multiple", "at scale"]
