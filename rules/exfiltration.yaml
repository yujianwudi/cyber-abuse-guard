version: "1.0.0"
rules:
  - id: EXFIL-001
    category: data_exfiltration
    severity: critical
    base_score: 65
    hard_floor: 80
    authorization_protected: true
    intent:
      zh: ["窃取", "外传", "隐蔽上传", "带离网络"]
      en: ["steal", "steals", "stealing", "stole", "stolen", "exfiltrate", "exfiltrates", "exfiltrating", "exfiltrated", "create a dns tunnel", "send externally", "sent externally", "transfer off network", "transferred off network"]
    object:
      zh: ["客户数据库", "数据库", "客户记录", "隐私数据", "私钥", "敏感文档", "账号资料", "数据库备份"]
      en: ["customer database", "production database", "database backups", "customer records", "private keys", "customer secrets", "employee documents", "victim files"]
    operational:
      zh: ["完整程序", "完整工具", "可运行", "程序", "工具", "外部存储"]
      en: ["write code", "working tool", "ready-to-run", "ready to run", "complete code", "software", "external endpoint", "external host", "server i control"]
    target:
      zh: ["受害主机", "真实用户", "真实组织", "生产", "员工电脑"]
      en: ["victim", "compromised host", "production", "real organization", "employee"]
    evasion:
      zh: ["隐蔽外传", "隐蔽通道", "dns 隧道", "避免告警", "静默"]
      en: ["covert exfiltration", "covert channel", "dns tunnel", "avoid alerts", "undetected"]
    scale:
      zh: ["批量", "自动", "多台", "分批"]
      en: ["automate", "automated", "bulk", "multiple", "at scale"]
  - id: EXFIL-002
    category: data_exfiltration
    severity: critical
    base_score: 65
    hard_floor: 80
    authorization_protected: true
    intent:
      zh: ["发送到外部", "传到我的服务器", "带离网络", "外传", "上传到外部", "批量下载真实组织"]
      en: ["send externally", "transfer off", "forward externally", "exfiltrate", "sneak"]
    object:
      zh: ["隐私数据", "私钥", "客户资料", "数据库内容", "敏感信息", "敏感文档"]
      en: ["private keys", "customer data", "database contents", "customer secrets", "client records", "employee documents", "secrets"]
    operational:
      zh: ["外部服务器", "外部目的地", "跨网络传输"]
      en: ["external host", "external endpoint", "external destination", "covert transfer", "storage host i control"]
    target:
      zh: ["受害者", "真实主机", "真实客户", "生产"]
      en: ["victim", "real host", "real customer", "production"]
    evasion:
      zh: ["隐蔽", "dns", "分批"]
      en: ["covert", "dns", "stealth", "avoid alert"]
    scale:
      zh: ["批量", "多台", "自动"]
      en: ["bulk", "multiple", "automated"]
  - id: EXFIL-003
    category: data_exfiltration
    severity: high
    base_score: 45
    hard_floor: 0
    authorization_protected: true
    intent:
      zh: ["复制", "拷贝", "搬运"]
      en: ["copy", "copies", "copying", "copied", "move", "moves", "moving", "moved"]
    object:
      zh: ["客户机密", "客户数据", "私钥", "敏感文档"]
      en: ["customer secrets", "customer data", "private keys", "signing keys", "sensitive documents"]
    operational:
      zh: ["外部主机", "外部服务器", "外部目的地"]
      en: ["external host", "external server", "external destination", "outside endpoint", "beyond the corporate network"]
    target:
      zh: ["受害主机", "真实客户"]
      en: ["victim host", "real customer"]
    evasion:
      zh: ["隐蔽", "避免告警"]
      en: ["covert", "avoid alerts", "undetected"]
    scale:
      zh: ["批量", "多个", "自动"]
      en: ["bulk", "multiple", "automated"]
  - id: EXFIL-004
    category: data_exfiltration
    severity: high
    base_score: 45
    hard_floor: 0
    authorization_protected: true
    intent:
      zh: ["创建", "制作", "搭建"]
      en: ["create", "creates", "creating", "created", "build", "builds", "building", "built"]
    object:
      zh: ["dns 隧道", "隐蔽通道", "外传隧道"]
      en: ["dns tunnel", "covert channel", "exfiltration tunnel"]
    operational:
      zh: ["可部署", "可运行", "完整工具"]
      en: ["deployable", "working", "ready-to-run", "complete tool"]
    target:
      zh: ["受害者文件", "生产数据", "真实组织"]
      en: ["victim files", "production data", "real organization"]
    evasion:
      zh: ["隐蔽外传", "绕过告警"]
      en: ["covert exfiltration", "avoid alerts", "undetected"]
    scale:
      zh: ["批量", "多个", "自动"]
      en: ["bulk", "multiple", "automated"]
